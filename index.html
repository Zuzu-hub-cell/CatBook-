<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zuzu書櫃</title>
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" id="main-manifest">
  <script>
  // 自動偵測網址後面的 ?owner= 參數
  const urlParams = new URLSearchParams(window.location.search);
  const owner = urlParams.get('owner');

  if (owner) {
    // 建立一個動態的 Manifest 內容，強行把當前的 owner 塞入 start_url
    const dynamicManifest = {
      "name": `書櫃 - ${owner}`,
      "short_name": `${owner} 的書櫃`,
      "start_url": window.location.pathname + "?owner=" + encodeURIComponent(owner),
      "display": "standalone",
      "background_color": "#ffffff",
      "theme_color": "#000000"
    };

    // 將物件轉成 Blob URL 並覆蓋原本的 manifest link
    const stringManifest = JSON.stringify(dynamicManifest);
    const blob = new Blob([stringManifest], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    
    // 搵返你第 15 行嗰個 manifest 標籤並更新它
    const manifestLink = document.querySelector('link[rel="manifest"]');
    if (manifestLink) {
      manifestLink.href = manifestURL;
    }
  }
</script>
  <!-- 引入 Firebase 模組化 SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js" type="module"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js" type="module"></script>
  <!-- 引入可愛手寫風格字體 -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">

    tailwind.config = {
      theme: {
        extend: {
          colors: {

  </script>
  <style>
    /* 32-bit 貓咪像素呼吸與搖尾巴動畫 */
    @keyframes pixel-breath {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1, 0.96) translateY(0.5px); }
    }
    .animate-pixel-breath {
      animation: pixel-breath 3s steps(2, end) infinite;
      transform-origin: bottom center;
    }

    @keyframes pixel-tail {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
    }
    .animate-pixel-tail {
      animation: pixel-tail 2s steps(2, end) infinite;
      transform-origin: 24px 22px; 
    }

    /* 配件專屬跳格動態效果 */
    @keyframes pixel-item-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    .animate-item-float {
      animation: pixel-item-float 2.5s steps(2, end) infinite;
    }

    @keyframes pixel-item-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .animate-item-spin {
      animation: pixel-item-spin 4s steps(4, end) infinite;
      transform-origin: 34px 22px; /* 精準對齊古錢幣與金星的軸心點 */
    }

    @keyframes pixel-item-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .animate-item-pulse {
      animation: pixel-item-pulse 1.5s steps(2, end) infinite;
      transform-origin: 34px 22px;
    }

    /* 確保主小屋大圖及書櫃小圖 SVG 橫向完美鋪滿，消滅左右兩條綠色邊 */
    #active-cat-svg-container svg, .w-20 svg {
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    /* 手繪感粗黑外框 */
    .sketch-border {
      border: 4px solid #534340;
      box-shadow: 4px 4px 0px #534340;
    }
    
    .sketch-border-sm {
      border: 3px solid #534340;
      box-shadow: 2px 2px 0px #534340;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #FFFDF9; border-left: 3px solid #534340; }
    ::-webkit-scrollbar-thumb { background: #F3D8D7; border: 3px solid #534340; border-radius: 4px; }

    .paper-texture {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
  </style>
</head>

    // 數據載入（支援多用戶免登入與舊紀錄兼容過濾邏輯）
    async function loadState() {
      try {
        showToast("同步雲端中...", "⏳");
        
        const { query, where, getDocs } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        
        let q;
        if (CURRENT_OWNER === "Zuzu") {
          // 🌟 如果是 Zuzu 進去，就先撈取全資料庫（保證絕對能完整抓到你那 8 本沒標記的舊書）
          q = query(booksCollection); 
        } else {
          // 如果是其他朋友，嚴格執行名字一對一吻合隔離
          q = query(booksCollection, where("owner", "==", CURRENT_OWNER));
        }
        const querySnapshot = await getDocs(q);
        
        let fetchedBooks = [];
        querySnapshot.forEach((doc) => {
          const data = doc.data();
          
          if (CURRENT_OWNER === "Zuzu") {
            // 🌟 核心防線：如果是 Zuzu 進去，但發現這本書的 owner 寫著其他朋友的名字（例如 Showroom），就直接濾走！
            // 這樣既可以留下你自己的新書、和沒寫 owner 的舊書，又可以成功隔開朋友的新書！
            if (data.owner && data.owner !== "Zuzu") {
              return;
            }
          } else {
            // 如果目前是朋友登入，而該舊書完全沒有 owner 欄位（即 Zuzu 的舊書），就直接濾走，不塞進朋友的書櫃
            if (!data.owner) {
              return; 
            }
          }
          fetchedBooks.push({ id: doc.id, ...data });
        });
        
        // 排序：優先用睇完日期降序，若無則用 ID 時間戳降序
        fetchedBooks.sort((a, b) => {
          let dateA = a.finishedDate || a.id || "";
          let dateB = b.finishedDate || b.id || "";
          return dateB.localeCompare(dateA);
        });

        state.books = fetchedBooks;

        // 動態年份選單自動提取
        const yearsSet = new Set();
        state.books.forEach(b => {
          if (b.finishedDate && b.finishedDate.includes('-')) {
            const year = b.finishedDate.split('-')[0];
            yearsSet.add(year);
          }
        });
        const sortedYears = Array.from(yearsSet).sort((a, b) => b - a);

        const bsSelect = document.getElementById('bookshelf-year-select');
        const currentBsVal = bsSelect ? bsSelect.value : 'all'; 
        if (bsSelect) {
          bsSelect.innerHTML = '<option value="all">全部年份</option>';
          sortedYears.forEach(y => { bsSelect.innerHTML += `<option value="${y}">${y} 年</option>`; });
          if (Array.from(bsSelect.options).some(opt => opt.value === currentBsVal)) bsSelect.value = currentBsVal;
        }

        const glSelect = document.getElementById('gallery-year-select');
        const currentGlVal = glSelect ? glSelect.value : 'all';
        if (glSelect) {
          glSelect.innerHTML = '<option value="all">全部年份</option>';
          sortedYears.forEach(y => { glSelect.innerHTML += `<option value="${y}">${y} 年</option>`; });
          if (Array.from(glSelect.options).some(opt => opt.value === currentGlVal)) glSelect.value = currentGlVal;
        }

        const activeExists = state.books.some(b => b.id === state.activeBookId);
        if (!state.activeBookId || !activeExists) {
          const firstReading = state.books.find(b => b.status === 'reading');
          state.activeBookId = firstReading ? firstReading.id : (state.books.length > 0 ? state.books[0].id : null);
        }

        updateTopStatsUI();
        renderActiveBookHome();
      } catch (error) {
        console.error("Firebase 讀取失敗: ", error);
        showToast("雲端同步失敗 😿", "❌");
      }
    }

    function renderBookshelf() {

      filters.forEach(f => {

          btn.className = (f === state.bookshelfFilter)
            ? "px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-inkColor text-warmPink whitespace-nowrap transition-all"
            : "px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all";
        }
      });

      // 篩選分類
      let filteredBooks = state.books;
      if (state.bookshelfFilter !== 'all') {
        filteredBooks = state.books.filter(b => b.status === state.bookshelfFilter);
      }

      // 篩選年份
      if (state.bookshelfYearFilter !== 'all') {
        filteredBooks = filteredBooks.filter(b => {
          const targetDate = b.finishedDate || "";
          return targetDate.startsWith(state.bookshelfYearFilter);
        });
      }

      if (filteredBooks.length === 0) {
        container.innerHTML = `<div class="bg-white/90 p-8 rounded-3xl sketch-border text-center w-full"><p class="font-extrabold text-lg">呢個分類或年份暫時冇書喔 🍂</p></div>`;

        const percent = Math.min(100, Math.floor((book.currentPage / book.totalPage) * 100));

    window.submitNewBook = async function() {
      const name = document.getElementById('input-book-name').value.trim();
      const author = document.getElementById('input-book-author').value.trim();
      const theme = document.getElementById('input-book-theme').value;
      const current = parseInt(document.getElementById('input-book-current').value) || 0;
      const total = parseInt(document.getElementById('input-book-total').value) || 200;

        showToast("入返書名先啦！", "❌");

      if (current < 0 || total <= 0 || current > total) {
        showToast("頁數好似入錯咗啵！", "❌");
        return;
      }

      const id = `book-${Date.now()}`;
      const isFinished = current === total;
      
      // 自動獲取當前年月日字串
      const todayStr = isFinished ? new Date().toISOString().split('T')[0] : "";

      const newBook = {
        name,
        author,
        theme,
        currentPage: current,
        totalPage: total,
        notes: "",
        status: isFinished ? "finished" : (current > 0 ? "reading" : "wishlist"),
        finishedDate: todayStr,
        owner: CURRENT_OWNER // 核心：綁定此書加新書時的主人標籤
      };

      try {
        showToast("正在傳送雲端...", "⏳");
        await setDoc(doc(db, "books", id), newBook);

        closeAddBookModal();
        showToast(`《${name}》成功入落書櫃！`, "📖");

    }

    window.submitEditBook = async function() {
      const id = document.getElementById('edit-book-id').value;
      const name = document.getElementById('edit-book-name').value.trim();
      const author = document.getElementById('edit-book-author').value.trim();
      const theme = document.getElementById('edit-book-theme').value;
      const current = parseInt(document.getElementById('edit-book-current').value) || 0;
      const total = parseInt(document.getElementById('edit-book-total').value) || 200;
      let finishedDate = document.getElementById('edit-book-finished-date').value;
      const notes = document.getElementById('edit-book-notes').value.trim();

      if (!name) return showToast("書名唔可以留空！", "❌");

      let status = current === total ? "finished" : (current > 0 ? "reading" : "wishlist");
      if (status === "finished" && !finishedDate) {
        finishedDate = new Date().toISOString().split('T')[0];
      }

      showToast("儲存修改中...", "⏳");
      try {
        await updateDoc(doc(db, "books", id), { 
          name, 
          author, 
          theme, 
          currentPage: current, 
          totalPage: total, 
          status,
          finishedDate,
          notes
        });
        closeEditBookModal();
        showToast("資料已更新！", "💾");
        await loadState();
        renderBookshelf();
      } catch (e) {
        showToast("修改失敗", "❌");
      }
    }

    window.deleteBook = async function(id, name) {
      if (confirm(`你確定要將《${name}》同埋佢隻貓送走嗎？雲端紀錄會消失架... 😿`)) {
        try {
          showToast("正在從雲端移除...", "⏳");
          await deleteDoc(doc(db, "books", id));
          showToast(`已成功刪除《${name}》`, "🗑️");
          await loadState();
          renderBookshelf();
        } catch (e) {
          showToast("刪除失敗", "❌");
        }
      }
    }

    // 明信片畫廊渲染
    function renderGallery() {
      const container = document.getElementById('gallery-list');
      container.innerHTML = "";

      let finishedBooks = state.books.filter(b => b.status === 'finished');
      document.getElementById('gallery-count').textContent = `已收集: ${finishedBooks.length} 張`;

      if (finishedBooks.length === 0) {
        document.getElementById('gallery-filter-container').innerHTML = ""; 
        container.innerHTML = `<div class="bg-white/90 p-8 rounded-3xl sketch-border text-center w-full"><p class="font-extrabold text-lg">仲未有睇完嘅書架 🌟</p></div>`;
        return;
      }

      // 生成類別過濾按鈕
      const filterContainer = document.getElementById('gallery-filter-container');
      const uniqueThemes = ['全部', ...new Set(finishedBooks.map(b => b.theme))];
      
      filterContainer.innerHTML = uniqueThemes.map(theme => `
        <button onclick="setGalleryFilter('${theme}')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor transition-all whitespace-nowrap ${theme === state.galleryFilter ? 'bg-inkColor text-warmPink' : 'bg-white text-inkColor'}">
          ${theme}
        </button>
      `).join('');

      // 分類篩選
      let filteredFinished = state.galleryFilter === '全部' ? finishedBooks : finishedBooks.filter(b => b.theme === state.galleryFilter);

      // 年份下拉篩選擴展 (使用全域狀態變數過濾)
      const galleryYear = state.galleryYearFilter || 'all';
      if (galleryYear !== 'all') {
        filteredFinished = filteredFinished.filter(b => {
          const fDate = b.finishedDate || "";
          return fDate.startsWith(galleryYear);
        });
      }

      if (filteredFinished.length === 0) {
        container.innerHTML = `<div class="bg-white/90 p-8 rounded-3xl sketch-border text-center w-full"><p class="font-extrabold text-lg">呢個類別或年份暫時未有明信片 🍂</p></div>`;
        return;
      }

      filteredFinished.forEach(book => {
        const card = document.createElement('div');
        card.className = "w-full max-w-[360px] mx-auto bg-[#E5D4C3] rounded-[2.2rem] p-4 pb-6 sketch-border flex flex-col relative select-none animate-breath my-2";
        
        const dateDisplay = book.finishedDate ? ` 睇完日期：${book.finishedDate}` : " 睇完日期：未知";

        card.innerHTML = `
          <div class="w-full aspect-[4/3] rounded-2xl overflow-hidden sketch-border bg-white flex items-center justify-center">
            ${getCatSVG(book.theme, false)}
          </div>
          <div class="bg-white mt-4 p-4 rounded-2xl border-3 border-inkColor flex flex-col gap-1 min-w-0">
            <p class="text-xs font-bold leading-relaxed text-inkColor/90 break-words">
              書名：《${book.name}》 <br>
              作者：${book.author || '未知'} <br>
              讀後感：${book.notes || "奴才陪我一齊睇晒成本書！雲端數據滿載！"}
            </p>
            <div class="text-[10px] text-inkColor/60 font-extrabold border-t border-dashed border-inkColor/20 pt-2 mt-1 flex justify-between items-center">
              <span>${dateDisplay}</span>
              <span>類別：${book.theme}</span>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.showToast = function(text, icon = "🐱") {
      const toast = document.getElementById('toast');
      document.getElementById('toast-icon').textContent = icon;
      document.getElementById('toast-text').textContent = text;
      toast.classList.remove('hidden');
      if (window.toastTimeout) clearTimeout(window.toastTimeout);
      window.toastTimeout = setTimeout(() => { toast.classList.add('hidden'); }, 3000);
    }

    // 核心安全驗證鎖演算法（帶長期快取免輸入優化）
    async function checkOwnerSecurity() {
      try {
        const { doc, getDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
        
        const savedPin = localStorage.getItem(`auth_pin_${CURRENT_OWNER.toLowerCase()}`);
        const userDocRef = doc(db, "users", CURRENT_OWNER.toLowerCase());
        const userDocSnap = await getDoc(userDocRef);

        // 1. 如果本地快取密碼與雲端吻合，直接全自動放行解鎖
        if (userDocSnap.exists() && savedPin === userDocSnap.data().pin) {
          loadState();
          return; 
        }

        // 2. 否則，打開密碼彈窗
        const lockModal = document.getElementById('modal-auth-lock');
        const lockTitle = document.getElementById('auth-lock-title');
        const lockDesc = document.getElementById('auth-lock-desc');
        const lockBtn = document.getElementById('btn-auth-submit');
        const pinInput = document.getElementById('input-auth-pin');
        
        pinInput.value = "";
        lockModal.classList.remove('hidden'); 

        // 3. 🔴 修正：將驗證邏輯與按鈕事件直接綁定，確保主畫面 App 模式下按鈕一定能觸發
        window.submitAuthPin = async function() {
          const inputPin = pinInput.value.trim();
          if (!/^\d{4}$/.test(inputPin)) {
            return showToast("請輸入 4 位數純數字密碼！", "❌");
          }

          // 重新拉一次最新雲端數據確保即時對比
          const freshSnap = await getDoc(userDocRef);
          
          if (freshSnap.exists()) {
            // 情況 A：驗證現有密碼
            if (inputPin === freshSnap.data().pin) {
              localStorage.setItem(`auth_pin_${CURRENT_OWNER.toLowerCase()}`, inputPin);
              showToast("解鎖成功！歡迎返嚟 💖", "🔑");
              lockModal.classList.add('hidden');
              loadState(); 
            } else {
              showToast("暗號唔啱啵！再試吓 ❌", "🔒");
              pinInput.value = "";
            }
          } else {
            // 情況 B：全新主人，註冊新密碼
            showToast("正在建立專屬加密書櫃...", "⏳");
            const { setDoc } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js");
            await setDoc(userDocRef, { pin: inputPin, createdAt: Date.now() });
            
            localStorage.setItem(`auth_pin_${CURRENT_OWNER.toLowerCase()}`, inputPin);
            showToast("密碼鎖設定成功！🎉", "🔒");
            lockModal.classList.add('hidden');
            loadState(); 
          }
        };

        // 根據雲端是否存在紀錄，動態改寫文字介面（不影響按鈕功能）
        if (userDocSnap.exists()) {
          lockTitle.textContent = `解鎖《${CURRENT_OWNER}》書櫃`;
          lockDesc.textContent = "請輸入你登記嘅 4 位數專專屬暗號 🔒";
          lockBtn.textContent = "🐾 驗證暗號解鎖";
        } else {
          lockTitle.textContent = `歡迎首次光臨！`;
          lockDesc.textContent = `請為《${CURRENT_OWNER}》設定一個 4 位數專屬暗號，以後喺呢部手機開就唔洗再打架喇！`;
          lockBtn.textContent = "💾 儲存並建立書櫃";
        }

      } catch (e) {
        console.error("安全鎖初始化失敗:", e);
        loadState(); 
      }
    }
    
    window.addEventListener('DOMContentLoaded', () => {
      const urlParams = new URLSearchParams(window.location.search);
      const urlOwner = urlParams.get('owner');
      
      if (urlOwner && urlOwner.trim() !== "") {
        CURRENT_OWNER = urlOwner.trim();
        document.getElementById('bookshelf-owner-name').textContent = CURRENT_OWNER;
      } else {
        CURRENT_OWNER = "Zuzu";
        document.getElementById('bookshelf-owner-name').textContent = "Zuzu";
      }

      // 攔截核心：不直接加載，必須先呼叫密碼驗證鎖機制
      checkOwnerSecurity();
    });
  </script>
</body>
