<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zuzu書櫃</title>
  <!-- 引入可愛手寫風格字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paperBlue: '#A5BAD2',
            warmPink: '#F3D8D7',
            cardBg: '#FFFDF9',
            inkColor: '#534340',
            accentOrange: '#F4A261',
            grassGreen: '#9CBD5B'
          },
          fontFamily: {
            hand: ['Gaegu', 'Fredoka', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* 貓咪溫和呼吸動畫 */
    @keyframes gentle-breath {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1.02, 0.97) translateY(-2px); }
    }
    .animate-breath {
      animation: gentle-breath 4s ease-in-out infinite;
      transform-origin: bottom center;
    }

    /* 尾巴搖擺動畫 */
    @keyframes tail-wag {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(10deg); }
    }
    .animate-tail {
      animation: tail-wag 3s ease-in-out infinite;
      transform-origin: 280px 175px;
    }

    /* 手繪感粗黑外框 */
    .sketch-border {
      border: 4px solid #534340;
      box-shadow: 4px 4px 0px #534340;
    }
    
    .sketch-border-sm {
      border: 3px solid #534340;
      box-shadow: 2px 2px 0px #534340;
    }

    /* 隱藏滾動條但保留滾動功能 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 溫馨滾動條樣式 */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #FFFDF9;
      border-left: 3px solid #534340;
    }
    ::-webkit-scrollbar-thumb {
      background: #F3D8D7;
      border: 3px solid #534340;
      border-radius: 4px;
    }

    /* 手繪紙張噪點濾鏡 */
    .paper-texture {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body class="bg-paperBlue font-hand text-inkColor min-h-screen relative flex flex-col overflow-x-hidden selection:bg-warmPink pb-8">
  
  <!-- 紙張噪點層 -->
  <div class="paper-texture"></div>

  <!-- 主容器 -->
  <main class="max-w-md w-full mx-auto px-4 pt-6 flex-grow flex flex-col justify-between">
    
    <!-- 頂部標題與狀態 -->
    <div class="w-full flex flex-col gap-4 mb-4">
      <div class="flex items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center gap-2">
          <!-- 手繪可愛貓咪頭像 -->
          <div class="w-10 h-10 flex items-center justify-center bg-warmPink rounded-full border-3 border-inkColor">
            <svg viewBox="0 0 100 100" class="w-7 h-7">
              <path d="M 20,40 C 20,20 80,20 80,40 C 80,60 70,80 50,80 C 30,80 20,60 20,40 Z" fill="#FFF" stroke="#534340" stroke-width="8"/>
              <path d="M 25,25 L 15,5 Q 35,10 35,25" fill="#FFF" stroke="#534340" stroke-width="8" stroke-linejoin="round"/>
              <path d="M 75,25 L 85,5 Q 65,10 65,25" fill="#FFF" stroke="#534340" stroke-width="8" stroke-linejoin="round"/>
              <circle cx="40" cy="45" r="5" fill="#534340"/>
              <circle cx="60" cy="45" r="5" fill="#534340"/>
              <path d="M 46,55 Q 50,58 54,55" fill="none" stroke="#534340" stroke-width="6" stroke-linecap="round"/>
            </svg>
          </div>
          <h1 class="text-3xl font-extrabold tracking-wide drop-shadow-sm select-none">Zuzu書櫃</h1>
        </div>
        
        <!-- 分頁切換按鈕（修正：放寬 min-w 並加上 flex-1 填滿不爆框） -->
        <div class="flex gap-1 bg-white/40 p-1 rounded-full border-2 border-inkColor min-w-[175px] justify-between">
          <button id="tab-home-btn" onclick="switchTab('home')" class="px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full bg-inkColor text-warmPink transition-all flex-1 text-center">小屋</button>
          <button id="tab-bookshelf-btn" onclick="switchTab('bookshelf')" class="px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full hover:bg-white/30 transition-all flex-1 text-center">書櫃</button>
          <button id="tab-gallery-btn" onclick="switchTab('gallery')" class="px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full hover:bg-white/30 transition-all flex-1 text-center">明信片</button>
        </div>
      </div> <!-- 修正：之前漏閉合的 div，導致排版亂咗 -->

      <!-- 圖書狀態面板 -->
      <div class="grid grid-cols-3 gap-2 bg-warmPink/90 rounded-2xl p-3 sketch-border text-center font-bold select-none">
        <div class="flex flex-col items-center justify-center bg-white/65 py-1 rounded-xl border-2 border-inkColor">
          <span class="text-xs text-inkColor/80">已睇完 🏆</span>
          <div class="flex items-center gap-1 mt-0.5">
            <span id="stat-finished" class="text-xl">0</span>
          </div>
        </div>
        <div class="flex flex-col items-center justify-center bg-white/65 py-1 rounded-xl border-2 border-inkColor">
          <span class="text-xs text-inkColor/80">睇緊 📖</span>
          <div class="flex items-center gap-1 mt-0.5">
            <span id="stat-reading" class="text-xl">0</span>
          </div>
        </div>
        <div class="flex flex-col items-center justify-center bg-white/65 py-1 rounded-xl border-2 border-inkColor">
          <span class="text-xs text-inkColor/80">想睇 💤</span>
          <div class="flex items-center gap-1 mt-0.5">
            <span id="stat-wishlist" class="text-xl">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 視圖主容器（永遠貼頂靠上） -->
    <div class="flex-grow flex flex-col justify-start pt-2 min-h-[460px]">

      <!-- ==================== VIEW 1: 小屋伴讀 (ACTIVE BOOK) ==================== -->
      <div id="view-home" class="w-full flex flex-col items-center gap-4 transition-all duration-300">
        
        <!-- 伴讀卡牌 -->
        <div class="w-full bg-warmPink rounded-[2.5rem] p-5 sketch-border flex flex-col relative select-none">
          
          <!-- 卡牌頂部狀態 -->
          <div class="flex justify-between items-center mb-3">
            <span class="bg-white px-4 py-1 rounded-full text-sm font-bold border-2 border-inkColor tracking-widest">
              睇緊伴讀中
            </span>
            <span id="home-card-header-right" class="text-lg font-extrabold pr-2 text-inkColor/90">
              伴讀緊
            </span>
          </div>

          <!-- 貓咪畫框 -->
          <div class="w-full aspect-[4/3] rounded-3xl overflow-hidden sketch-border bg-[#9CBD5B] relative flex items-center justify-center cursor-pointer active:scale-[0.98] transition-transform" onclick="petActiveCat()">
            <!-- 動態繪製 SVG 貓咪 -->
            <div id="active-cat-svg-container" class="w-full h-full p-2"></div>
            
            <!-- 摸貓貓時飄出嘅心心 -->
            <div id="heart-floaters" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
            
            <!-- 摸貓提示 -->
            <div class="absolute bottom-2 right-4 bg-white/80 border-2 border-inkColor text-[11px] px-2 py-0.5 rounded-full font-bold opacity-60">
              🐾 摸吓貓貓
            </div>
          </div>

          <!-- 書名橫幅 -->
          <div class="bg-white mt-4 py-2 px-3 rounded-2xl border-3 border-inkColor flex flex-col items-center text-center">
            <span id="active-book-title" class="text-xl font-black">《致富心態》</span>
            <span id="active-book-author" class="text-xs font-semibold text-inkColor/70 mt-0.5">作者：摩根·豪瑟</span>
          </div>

          <!-- 進度詳情欄 -->
          <div class="bg-white/90 mt-3 p-4 rounded-3xl border-3 border-inkColor flex flex-col gap-2">
            <div class="flex justify-between text-sm font-bold">
              <span>飽食親密度</span>
              <span id="active-progress-text">讀咗 30%</span>
            </div>
            <!-- 進度條 -->
            <div class="w-full h-5 bg-warmPink/50 rounded-full border-3 border-inkColor overflow-hidden relative">
              <div id="active-progress-bar" class="h-full bg-accentOrange border-r-3 border-inkColor transition-all duration-500" style="width: 30%;"></div>
            </div>
          </div>

        </div>

        <!-- 登記進度按鈕 -->
        <button onclick="openLogModal()" class="w-full bg-accentOrange hover:bg-amber-400 py-3.5 rounded-2xl sketch-border font-black text-xl tracking-wider active:translate-y-1 active:shadow-none transition-all">
          📖 記低今日讀書進度
        </button>
      </div>

      <!-- ==================== VIEW 2: 書櫃 (BOOKSHELF) ==================== -->
      <div id="view-bookshelf" class="w-full flex flex-col gap-4 transition-all duration-300 hidden">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-black">我嘅藏書同貓貓</h2>
          <button onclick="openAddBookModal()" class="bg-warmPink hover:bg-pink-200 px-4 py-2 rounded-xl sketch-border-sm font-bold text-sm">
            ➕ 加新書
          </button>
        </div>

        <!-- 狀態篩選按鈕列（修正：加大下方邊距防止剪邊陰影） -->
        <div class="w-full flex-shrink-0 flex gap-1.5 overflow-x-auto px-1 pb-2 no-scrollbar select-none">
          <button id="filter-bs-all" onclick="setBookshelfFilter('all')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-inkColor text-warmPink whitespace-nowrap transition-all">全部</button>
          <button id="filter-bs-reading" onclick="setBookshelfFilter('reading')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all">睇緊 📖</button>
          <button id="filter-bs-wishlist" onclick="setBookshelfFilter('wishlist')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all">想睇 💤</button>
          <button id="filter-bs-finished" onclick="setBookshelfFilter('finished')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all">已睇完 🏆</button>
        </div>

        <!-- 書櫃列表（交給自然高度渲染，無雙滾動條卡死問題） -->
        <div id="bookshelf-list" class="grid grid-cols-1 gap-4 pr-1 pb-4"></div>
      </div>

      <!-- ==================== VIEW 3: 明信片畫廊 (GALLERY) ==================== -->
      <div id="view-gallery" class="w-full flex flex-col gap-4 transition-all duration-300 hidden">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-black">成就明信片畫廊</h2>
          <span id="gallery-count" class="bg-white border-2 border-inkColor px-3 py-1 rounded-full text-xs font-bold">已收集: 0 張</span>
        </div>

        <!-- 動態類別篩選按鈕列 -->
        <div id="gallery-filter-container" class="w-full flex-shrink-0 flex gap-1.5 overflow-x-auto px-1 pb-2 no-scrollbar select-none">
          <!-- 將由 JS 動態生成 -->
        </div>

        <!-- 明信片列表 -->
        <div id="gallery-list" class="grid grid-cols-1 gap-6 px-2 pb-12"></div>
      </div>

    </div>

  </main>

  <!-- ==================== MODAL: 新增書籍 ==================== -->
  <div id="modal-add-book" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-cardBg w-full max-w-sm rounded-[2rem] sketch-border p-6 relative flex flex-col max-h-[85vh] animate-breath" style="animation-duration: 8s;">
      
      <!-- 關閉按鈕 -->
      <button onclick="closeAddBookModal()" class="absolute -top-3 -right-3 bg-warmPink hover:bg-pink-200 w-10 h-10 rounded-full sketch-border-sm flex items-center justify-center text-xl font-bold z-10">
        ❌
      </button>

      <h3 class="text-2xl font-black text-center border-b-3 border-inkColor pb-2 flex-shrink-0">新加一本書</h3>

      <!-- 只有呢個內容器會捲動 -->
      <div class="overflow-y-auto flex-grow flex flex-col gap-4 pt-3 pr-1 no-scrollbar">
        <!-- 輸入表單 -->
        <div class="flex flex-col gap-3 font-semibold text-sm">
          <div class="flex flex-col gap-1">
            <label>📖 書名</label>
            <input id="input-book-name" type="text" placeholder="例如：福爾摩斯探案集" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none focus:bg-warmPink/25 font-bold">
          </div>
          <div class="flex flex-col gap-1">
            <label>✏️ 作者</label>
            <input id="input-book-author" type="text" placeholder="example：柯南·道爾" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none focus:bg-warmPink/25 font-bold">
          </div>
          <div class="flex flex-col gap-1">
            <label>🏷️ 揀個書本主題（會吸引唔同貓貓架）</label>
            <select id="input-book-theme" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none focus:bg-warmPink/25 font-bold">
              <option value="翻譯文學">🌍 翻譯文學 (班紋優雅暹羅貓)</option>
              <option value="詩">✍️ 詩 (配羽毛筆波斯貓)</option>
              <option value="科幻/奇幻小說">🚀 科幻/奇幻小說 (流星伴讀外星貓)</option>
              <option value="懸疑/推理小說">🔍 懸疑/推理小說 (小偵探帽學霸貓)</option>
              <option value="恐怖/驚悚小說">👻 恐怖/驚悚小說 (幽靈伴眠小黑貓)</option>
              <option value="溫馨/療癒小說">☕ 溫馨/療癒小說 (暖茶香橙奶斑貓)</option>
              <option value="愛情小說">💖 愛情小說 (粉嫩桃花布偶貓)</option>
              <option value="歷史/武俠小說">📜 歷史/武俠小說 (古卷竹簡俠客貓)</option>
              <option value="輕小說">🍙 輕小說 (御飯糰面罩元氣貓)</option>
              <option value="藝術設計">🎨 藝術設計 (戴畫家帽玳瑁貓)</option>
              <option value="飲食">🐟 飲食 (愛吃魚魚小胖貓)</option>
              <option value="商業 / 理財投資">🪙 商業 / 理財投資 (金幣發光招財橘貓)</option>
              <option value="心靈 / 心理成長">🌱 心靈 / 心理成長 (生機小綠芽護心貓)</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div class="flex flex-col gap-1">
              <label>🏁 現時頁數</label>
              <input id="input-book-current" type="number" min="0" value="0" inputmode="numeric" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
            </div>
            <div class="flex flex-col gap-1">
              <label>📖 總頁數</label>
              <input id="input-book-total" type="number" min="1" value="200" inputmode="numeric" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
            </div>
          </div>
        </div>

        <button onclick="submitNewBook()" class="bg-accentOrange hover:bg-amber-400 py-3 rounded-xl sketch-border-sm font-black text-lg active:translate-y-1 transition-all flex-shrink-0 mb-1">
          🐾 帶小流浪貓返屋企
        </button>
      </div>

    </div>
  </div>

  <!-- ==================== MODAL: 修改/編輯書籍 ==================== -->
  <div id="modal-edit-book" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-cardBg w-full max-w-sm rounded-[2rem] sketch-border p-6 relative flex flex-col max-h-[85vh] animate-breath" style="animation-duration: 8s;">
      
      <!-- 關閉按鈕 -->
      <button onclick="closeEditBookModal()" class="absolute -top-3 -right-3 bg-warmPink hover:bg-pink-200 w-10 h-10 rounded-full sketch-border-sm flex items-center justify-center text-xl font-bold z-10">
        ❌
      </button>

      <h3 class="text-2xl font-black text-center border-b-3 border-inkColor pb-2 flex-shrink-0">修改書籍資料</h3>

      <div class="overflow-y-auto flex-grow flex flex-col gap-4 pt-3 pr-1 no-scrollbar">
        <input id="edit-book-id" type="hidden">

        <div class="flex flex-col gap-3 font-semibold text-sm">
          <div class="flex flex-col gap-1">
            <label>📖 書名</label>
            <input id="edit-book-name" type="text" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
          </div>
          <div class="flex flex-col gap-1">
            <label>✏️ 作者</label>
            <input id="edit-book-author" type="text" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
          </div>
          <div class="flex flex-col gap-1">
            <label>🏷️ 書本主題</label>
            <select id="edit-book-theme" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
              <option value="翻譯文學">🌍 翻譯文學</option>
              <option value="詩">✍️ 詩</option>
              <option value="科幻/奇幻小說">🚀 科幻/奇幻小說</option>
              <option value="懸疑/推理小說">🔍 懸疑/推理小說</option>
              <option value="恐怖/驚悚小說">👻 恐怖/驚悚小說</option>
              <option value="溫馨/療癒小說">☕ 溫馨/療癒小說</option>
              <option value="愛情小說">💖 愛情小說</option>
              <option value="歷史/武俠小說">📜 歷史/武俠小說</option>
              <option value="輕小說">🍙 輕小說</option>
              <option value="藝術設計">🎨 藝術設計</option>
              <option value="飲食">🐟 飲食</option>
              <option value="商業 / 理財投資">🪙 商業 / 理財投資</option>
              <option value="心靈 / 心理成長">🌱 心靈 / 心理成長</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div class="flex flex-col gap-1">
              <label>🏁 現時頁數</label>
              <input id="edit-book-current" type="number" min="0" inputmode="numeric" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
            </div>
            <div class="flex flex-col gap-1">
              <label>📖 總頁數</label>
              <input id="edit-book-total" type="number" min="1" inputmode="numeric" class="bg-white border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
            </div>
          </div>
        </div>

        <button onclick="submitEditBook()" class="bg-[#9CBD5B] hover:bg-green-500 py-3 rounded-xl sketch-border-sm font-black text-lg active:translate-y-1 transition-all flex-shrink-0 mb-1">
          💾 儲存修改
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== MODAL: 登記進度 ==================== -->
  <div id="modal-log-progress" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-cardBg w-full max-w-sm rounded-[2rem] sketch-border p-6 relative flex flex-col max-h-[85vh] animate-breath" style="animation-duration: 9s;">
      
      <!-- 關閉按鈕 -->
      <button onclick="closeLogModal()" class="absolute -top-3 -right-3 bg-warmPink hover:bg-pink-200 w-10 h-10 rounded-full sketch-border-sm flex items-center justify-center text-xl font-bold z-10">
        ❌
      </button>

      <h3 class="text-2xl font-black text-center border-b-3 border-inkColor pb-2 flex-shrink-0">今日讀書成果</h3>
      
      <div class="overflow-y-auto flex-grow flex flex-col gap-4 pt-3 pr-1 no-scrollbar">
        <p class="text-sm font-semibold text-center text-inkColor/80">
          更新《<span id="log-book-name-label" class="font-extrabold text-accentOrange"></span>》讀到第幾頁，餵吓你隻貓貓！
        </p>

        <div class="flex flex-col gap-4 font-bold">
          <div class="flex justify-between items-center bg-warmPink/40 p-3 rounded-xl border-2 border-inkColor">
            <span>原本讀到：</span>
            <span id="log-current-status-label">0 / 200 頁</span>
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm">📖 我今日讀到第幾頁？</label>
            <input id="input-log-new-page" type="number" inputmode="numeric" class="bg-white border-3 border-inkColor p-3 rounded-xl outline-none text-xl text-center" placeholder="輸入目標頁數">
          </div>

          <div class="flex flex-col gap-1">

        <button onclick="submitProgress()" class="bg-[#9CBD5B] hover:bg-green-500 py-3 rounded-xl sketch-border-sm font-black text-lg active:translate-y-1 transition-all flex-shrink-0 mb-1">

  <!-- 客製化彈窗提示 -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-white px-6 py-3 rounded-full sketch-border-sm font-bold z-[200] hidden flex items-center gap-2 animate-bounce">

  <script>
    // ==================== 修改與刪除功能邏輯 ====================
    
    // 打開編輯視窗並自動填入原本嘅資料
    function openEditBookModal(id) {
      const book = state.books.find(b => b.id === id);
      if (!book) return;

      document.getElementById('edit-book-id').value = book.id;
      document.getElementById('edit-book-name').value = book.name;
      document.getElementById('edit-book-author').value = book.author;
      document.getElementById('edit-book-theme').value = book.theme;
      document.getElementById('edit-book-current').value = book.currentPage;
      document.getElementById('edit-book-total').value = book.totalPage;

      document.getElementById('modal-edit-book').classList.remove('hidden');
    }

    function closeEditBookModal() {
      document.getElementById('modal-edit-book').classList.add('hidden');
    }

    // 儲存修改
    function submitEditBook() {
      const id = document.getElementById('edit-book-id').value;
      const book = state.books.find(b => b.id === id);
      if (!book) return;

      const name = document.getElementById('edit-book-name').value.trim();
      const author = document.getElementById('edit-book-author').value.trim();
      const theme = document.getElementById('edit-book-theme').value;
      const current = parseInt(document.getElementById('edit-book-current').value) || 0;
      const total = parseInt(document.getElementById('edit-book-total').value) || 200;

      if (!name) {
        showToast("書名唔可以留空字！", "❌");
        return;
      }
      if (current < 0 || total <= 0 || current > total) {
        showToast("頁數比例好似唔多啱啵！", "❌");
        return;
      }

      // 更新數據
      book.name = name;
      book.author = author;
      book.theme = theme;
      book.currentPage = current;
      book.totalPage = total;

      // 根據頁數自動校正狀態
      if (current === total) {
        book.status = "finished";
        if (state.activeBookId === id) state.activeBookId = null; 
      } else if (current > 0) {
        book.status = "reading";
      } else {
        book.status = "wishlist";
      }

      saveState();
      updateTopStatsUI();
      closeEditBookModal();
      showToast(`《${name}》資料已更新！`, "💾");
      renderBookshelf();
      renderActiveBookHome();
    }

    // 刪除書籍功能
    function deleteBook(id, name) {
      if (confirm(`你確定要將《${name}》同埋佢隻貓貓送走嗎？不留痕跡架喔... 😿`)) {
        state.books = state.books.filter(b => b.id !== id);
        
        if (state.activeBookId === id) {
          const nextInLine = state.books.find(b => b.status === 'reading');
          state.activeBookId = nextInLine ? nextInLine.id : null;
        }

        saveState();
        updateTopStatsUI();
        showToast(`已成功刪除《${name}》`, "🗑️");
        renderBookshelf();
        renderActiveBookHome();
      }
    }

    function loadState() {
      const stored = localStorage.getItem('zuzu_bookshelf_state');
      if (stored) {
        try {
          state = JSON.parse(stored);
        } catch (e) {
          console.error("狀態解析失敗，載入預設值。", e);
        }
      } else {
        state.books = DEFAULT_BOOKS;
        state.activeBookId = "book-1";
        saveState();

      localStorage.setItem('zuzu_bookshelf_state', JSON.stringify(state));

    // 分頁切換邏輯
    function switchTab(viewName) {
      document.getElementById('view-home').classList.add('hidden');
      document.getElementById('view-bookshelf').classList.add('hidden');
      document.getElementById('view-gallery').classList.add('hidden');

      document.getElementById('tab-home-btn').className = "px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full hover:bg-white/30 transition-all flex-1 text-center";
      document.getElementById('tab-bookshelf-btn').className = "px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full hover:bg-white/30 transition-all flex-1 text-center";
      document.getElementById('tab-gallery-btn').className = "px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full hover:bg-white/30 transition-all flex-1 text-center";

      if (viewName === 'home') {
        document.getElementById('view-home').classList.remove('hidden');
        document.getElementById('tab-home-btn').className = "px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full bg-inkColor text-warmPink transition-all flex-1 text-center";
        renderActiveBookHome();
      } else if (viewName === 'bookshelf') {
        document.getElementById('view-bookshelf').classList.remove('hidden');
        document.getElementById('tab-bookshelf-btn').className = "px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full bg-inkColor text-warmPink transition-all flex-1 text-center";
        renderBookshelf();
      } else if (viewName === 'gallery') {
        document.getElementById('view-gallery').classList.remove('hidden');
        document.getElementById('tab-gallery-btn').className = "px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full bg-inkColor text-warmPink transition-all flex-1 text-center";
        renderGallery();
      }
    }

    function showToast(text, icon = "🐱") {
      const toast = document.getElementById('toast');
      document.getElementById('toast-icon').textContent = icon;
      document.getElementById('toast-text').textContent = text;
      toast.classList.remove('hidden');
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 3000);
    }

    function renderActiveBookHome() {
      const activeBook = state.books.find(b => b.id === state.activeBookId);
      const container = document.getElementById('active-cat-svg-container');
      
      if (!activeBook) {
        document.getElementById('active-book-title').textContent = "未有睇緊嘅書";
        document.getElementById('active-book-author').textContent = "快啲去「書櫃」揀本書，吸引流浪貓貓過嚟啦！";
        document.getElementById('active-progress-text').textContent = "進度：0%";
        document.getElementById('active-progress-bar').style.width = "0%";
        document.getElementById('home-card-header-right').textContent = "流浪緊";
        container.innerHTML = getCatSVG("心靈 / 心理成長", false);
        return;
      }

      document.getElementById('active-book-title').textContent = `《${activeBook.name}》`;
      document.getElementById('active-book-author').textContent = `作者：${activeBook.author || '佚名'}`;
      
      const percent = Math.min(100, Math.floor((activeBook.currentPage / activeBook.totalPage) * 100));
      document.getElementById('active-progress-text').textContent = `讀咗 ${percent}% (${activeBook.currentPage}/${activeBook.totalPage} 頁)`;
      document.getElementById('active-progress-bar').style.width = `${percent}%`;
      document.getElementById('home-card-header-right').textContent = `伴讀緊`;

      container.innerHTML = getCatSVG(activeBook.theme, true);
    }

    function petActiveCat() {
      const activeBook = state.books.find(b => b.id === state.activeBookId);
      if (!activeBook) {
        showToast("出面有隻流浪貓探緊頭，快啲帶佢返屋企啦！", "🐾");
        return;
      }

      const container = document.getElementById('heart-floaters');
      const heart = document.createElement('div');
      heart.textContent = "💖";
      heart.className = "absolute text-2xl transition-all duration-1000 select-none pointer-events-none";
      heart.style.left = `${Math.random() * 80 + 10}%`;
      heart.style.top = `60%`;
      heart.style.opacity = "1";
      container.appendChild(heart);

      setTimeout(() => {
        heart.style.transform = `translateY(-100px) scale(1.5)`;
        heart.style.opacity = "0";
      }, 50);

      setTimeout(() => { heart.remove(); }, 1100);

      const meows = ["喵嗚~ 呼嚕呼嚕...", "喵~ 主人摸得好舒服呀！", "（踩奶中...）🐾", "（瞇起眼仔瞓覺）💤", "喵！睇多幾頁書，我就飽飽喇！"];
      showToast(meows[Math.floor(Math.random() * meows.length)], "💖");
    }

    function updateTopStatsUI() {
      const finishedCount = state.books.filter(b => b.status === 'finished').length;
      const readingCount = state.books.filter(b => b.status === 'reading').length;
      const wishlistCount = state.books.filter(b => b.status === 'wishlist').length;

      document.getElementById('stat-finished').textContent = finishedCount;
      document.getElementById('stat-reading').textContent = readingCount;
      document.getElementById('stat-wishlist').textContent = wishlistCount;
    }

    // 核心修正：保留「修改」與「刪除」功能按鈕的單一完美書櫃渲染函數
    function renderBookshelf() {
      const container = document.getElementById('bookshelf-list');
      container.innerHTML = "";

      const filters = ['all', 'reading', 'wishlist', 'finished'];
      filters.forEach(f => {
        const btn = document.getElementById(`filter-bs-${f}`);
        if (btn) {
          if (f === state.bookshelfFilter) {
            btn.className = "px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-inkColor text-warmPink whitespace-nowrap transition-all";
          } else {
            btn.className = "px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all";
          }
        }
      });

      let filteredBooks = state.books;
      if (state.bookshelfFilter !== 'all') {
        filteredBooks = state.books.filter(b => b.status === state.bookshelfFilter);
      }

      if (filteredBooks.length === 0) {
        container.innerHTML = `
          <div class="bg-white/90 p-8 rounded-3xl sketch-border text-center">
            <p class="font-extrabold text-lg">呢個分類暫時冇書喔 🍂</p>
          </div>
        `;
        return;
      }

      filteredBooks.forEach(book => {
        const percent = Math.min(100, Math.floor((book.currentPage / book.totalPage) * 100));
        const isActive = book.id === state.activeBookId;
        
        let statusBadge = "";
        let actionButton = "";

        if (book.status === 'finished') {
          statusBadge = `<span class="bg-emerald-100 text-emerald-800 text-xs px-2 py-0.5 rounded-full border-2 border-emerald-800 font-extrabold">🏆 已睇完</span>`;
          actionButton = `<span class="text-xs text-emerald-700 font-bold mr-2">已完讀明信片</span>`;
        } else if (book.status === 'wishlist') {
          statusBadge = `<span class="bg-amber-100 text-amber-800 text-xs px-2 py-0.5 rounded-full border-2 border-amber-800 font-extrabold">💤 想睇</span>`;
          actionButton = `
            <button onclick="adoptBook('${book.id}')" class="bg-accentOrange hover:bg-amber-400 px-2.5 py-1 rounded-xl sketch-border-sm text-xs font-black mr-2">
              開始伴讀
            </button>
          `;
        } else {
          statusBadge = `<span class="bg-blue-100 text-blue-800 text-xs px-2 py-0.5 rounded-full border-2 border-blue-800 font-extrabold">📖 睇緊</span>`;
          actionButton = isActive 
            ? `<span class="text-xs text-accentOrange font-black mr-2">🏠 小屋伴讀中</span>`
            : `
              <button onclick="setActiveBook('${book.id}')" class="bg-warmPink hover:bg-pink-200 px-2.5 py-1 rounded-xl sketch-border-sm text-xs font-black mr-2">
                去小屋
              </button>
            `;
        }

        const card = document.createElement('div');
        card.className = `p-4 rounded-3xl sketch-border flex gap-4 items-center transition-all ${isActive ? 'bg-warmPink/40' : 'bg-white'}`;
        const miniSvgHtml = getCatSVG(book.theme, false);

        card.innerHTML = `
          <div class="w-16 h-16 rounded-xl overflow-hidden border-2 border-inkColor bg-grassGreen flex-shrink-0 relative">
            ${miniSvgHtml}
          </div>
          <div class="flex-grow flex flex-col gap-1">
            <div class="flex justify-between items-start">
              <div>
                <h3 class="font-extrabold text-base leading-tight">《${book.name}》</h3>
                <p class="text-xs text-inkColor/70 font-semibold">作者：${book.author || '佚名'}</p>
              </div>
              <div class="flex flex-col items-end gap-1">
                ${statusBadge}
                <button onclick="deleteBook('${book.id}', '${book.name}')" class="text-xs opacity-40 hover:opacity-100 transition-opacity text-rose-600 font-bold">🗑️ 刪除</button>
              </div>
            </div>
            
            <div class="flex items-center gap-2 mt-1">
              <div class="flex-grow h-3 bg-warmPink/30 rounded-full border-2 border-inkColor overflow-hidden">
                <div class="h-full bg-accentOrange" style="width: ${percent}%;"></div>
              </div>
              <span class="text-xs font-bold whitespace-nowrap">${percent}%</span>
            </div>

            <div class="flex justify-between items-center mt-2 border-t-2 border-dashed border-inkColor/20 pt-2">
              <span class="text-[10px] bg-white border border-inkColor px-2 py-0.5 rounded text-inkColor/70 font-semibold">${book.theme}</span>
              <div class="flex items-center">
                ${actionButton}
                <button onclick="openEditBookModal('${book.id}')" class="bg-white hover:bg-slate-100 p-1 rounded-lg border border-inkColor text-xs font-bold">✏️ 修改</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

    function setActiveBook(id) {
      state.activeBookId = id;
      saveState();
      showToast("成功將貓貓帶到小屋！", "🏠");
      updateTopStatsUI();
      renderBookshelf();
    }

    function adoptBook(id) {
      const book = state.books.find(b => b.id === id);
      if (book) {
        book.status = "reading";
        state.activeBookId = id;
        saveState();
        showToast(`成功收養咗《${book.name}》嘅主題貓貓！`, "🎉");
        updateTopStatsUI();
        renderBookshelf();
      }
    }

    function setBookshelfFilter(filterType) {
      state.bookshelfFilter = filterType;
      renderBookshelf();
    }

    function setGalleryFilter(theme) {
      state.galleryFilter = theme;
      renderGallery();
    }

    function openAddBookModal() {
      document.getElementById('modal-add-book').classList.remove('hidden');
    }
    function closeAddBookModal() {
      document.getElementById('modal-add-book').classList.add('hidden');
    }

    function submitNewBook() {
      const name = document.getElementById('input-book-name').value.trim();
      const author = document.getElementById('input-book-author').value.trim();
      const theme = document.getElementById('input-book-theme').value;
      const current = parseInt(document.getElementById('input-book-current').value) || 0;
      const total = parseInt(document.getElementById('input-book-total').value) || 200;

      if (!name) {
        showToast("入返書名先啦！", "❌");
        return;
      }
      if (current < 0 || total <= 0 || current > total) {
        showToast("頁數好似入錯咗啵！", "❌");
        return;
      }

      const id = `book-${Date.now()}`;
      const isFinished = current === total;

      state.books.push({
        id,
        name,
        author,
        theme,
        currentPage: current,
        totalPage: total,
        notes: "",
        status: isFinished ? "finished" : (current > 0 ? "reading" : "wishlist")
      });

      if (!isFinished) {
        state.activeBookId = id; 
      }

      saveState();
      updateTopStatsUI();
      closeAddBookModal();
      showToast(`《${name}》成功入落書櫃！`, "📖");
      
      document.getElementById('input-book-name').value = "";
      document.getElementById('input-book-author').value = "";
      document.getElementById('input-book-current').value = 0;

      switchTab('bookshelf');
    }

    function openLogModal() {
      const activeBook = state.books.find(b => b.id === state.activeBookId);
      if (!activeBook) {
        showToast("去書櫃揀本書伴讀先啦！", "🐾");
        return;
      }

      document.getElementById('log-book-name-label').textContent = activeBook.name;
      document.getElementById('log-current-status-label').textContent = `${activeBook.currentPage} / ${activeBook.totalPage} 頁`;
      document.getElementById('input-log-new-page').value = activeBook.currentPage;
      document.getElementById('input-log-note').value = "";

      document.getElementById('modal-log-progress').classList.remove('hidden');
    }

    function closeLogModal() {
      document.getElementById('modal-log-progress').classList.add('hidden');
    }

    function submitProgress() {
      const activeBook = state.books.find(b => b.id === state.activeBookId);
      if (!activeBook) return;

      const newPage = parseInt(document.getElementById('input-log-new-page').value);
      const note = document.getElementById('input-log-note').value.trim();

      if (isNaN(newPage) || newPage < activeBook.currentPage || newPage > activeBook.totalPage) {
        showToast(`頁數要喺 ${activeBook.currentPage} 同 ${activeBook.totalPage} 之間！`, "❌");
        return;
      }

      activeBook.currentPage = newPage;
      if (note) {
        activeBook.notes = note;
      }

      let alertText = `讀完啦！真係好叻！`;

      if (newPage === activeBook.totalPage) {
        activeBook.status = "finished";
        alertText = `🎉 好好叻啊！《${activeBook.name}》全部睇完！攞到張成就明信片！`;
        const nextInLine = state.books.find(b => b.status === 'reading' && b.id !== activeBook.id);
        state.activeBookId = nextInLine ? nextInLine.id : null;
      }

      saveState();
      updateTopStatsUI();
      closeLogModal();
      showToast(alertText, "🥫");
      renderActiveBookHome();
    }

    function renderGallery() {
      const container = document.getElementById('gallery-list');
      container.innerHTML = "";

      const finishedBooks = state.books.filter(b => b.status === 'finished');
      document.getElementById('gallery-count').textContent = `已收集: ${finishedBooks.length} 張`;

      if (finishedBooks.length === 0) {
        document.getElementById('gallery-filter-container').innerHTML = ""; 
        container.innerHTML = `
          <div class="bg-white/90 p-8 rounded-3xl sketch-border text-center">
            <p class="font-extrabold text-lg">仲未有睇完嘅書架 🌟</p>
            <p class="text-xs text-inkColor/70 mt-2">當你將書睇到 100%，可愛嘅貓貓就會將你哋嘅回憶畫成明信片，儲喺呢度陪住你！</p>
          </div>
        `;
        return;
      }

      const filterContainer = document.getElementById('gallery-filter-container');
      const uniqueThemes = ['全部', ...new Set(finishedBooks.map(b => b.theme))];
      
      if (!uniqueThemes.includes(state.galleryFilter)) {
        state.galleryFilter = '全部';
      }

      filterContainer.innerHTML = uniqueThemes.map(theme => {
        const isSelected = theme === state.galleryFilter;
        return `
          <button onclick="setGalleryFilter('${theme}')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor transition-all whitespace-nowrap ${
            isSelected ? 'bg-inkColor text-warmPink' : 'bg-white text-inkColor'
          }">
            ${theme}
          </button>
        `;
      }).join('');

      const filteredFinished = state.galleryFilter === '全部' 
        ? finishedBooks 
        : finishedBooks.filter(b => b.theme === state.galleryFilter);

      if (filteredFinished.length === 0) {
        container.innerHTML = `
          <div class="bg-white/90 p-8 rounded-3xl sketch-border text-center">
            <p class="font-extrabold text-lg">呢個類別暫時未有明信片 🍂</p>
          </div>
        `;
        return;
      }

      filteredFinished.forEach(book => {
        const card = document.createElement('div');
        card.className = "w-full max-w-[385px] mx-auto bg-[#E5D4C3] rounded-[2.2rem] p-4.5 sketch-border flex flex-col relative select-none animate-breath my-2";
        card.style.animationDuration = "12s";

        const catSvg = getCatSVG(book.theme, false);

        card.innerHTML = `
          <div class="flex justify-between items-center mb-2 px-1">
            <span class="text-xl font-black text-rose-400 tracking-wider">COMPLETED</span>
            <span class="text-base font-extrabold text-rose-400">+250 HP</span>
          </div>
          <div class="w-full aspect-[4/3] rounded-2xl overflow-hidden sketch-border bg-grassGreen relative flex items-center justify-center">
            ${catSvg}
          </div>
          <div class="bg-[#D3A99B] border-3 border-inkColor py-1 px-3 rounded-xl flex justify-between items-center mt-3">
            <span class="text-white font-extrabold text-sm tracking-wide">睇完啦：《${book.name}》</span>
            <div class="flex text-amber-300 text-xs">
              <span>★</span><span>★</span><span>★</span><span>★</span><span>★</span>
            </div>
          </div>
          <div class="bg-white mt-2 p-3 rounded-2xl border-3 border-inkColor flex flex-col gap-1">
            <p class="text-[10px] uppercase tracking-wider text-rose-400 font-extrabold">伴讀紀錄同諗法</p>
            <p class="text-xs font-bold leading-relaxed text-inkColor/90">
              書名：《${book.name}》 <br>
              作者：${book.author || '未知'} <br>
              讀後感：${book.notes || "奴才陪我一齊睇晒成本書！我依家元氣滿滿，等我每日都黐住你大腿發出呼嚕聲，陪你渡過人生中所有溫暖嘅好時光啦！"}
            </p>
          </div>
          <div class="flex justify-between items-center mt-2 px-1 text-[9px] font-extrabold text-inkColor/60">
            <span>🐾 類別：${book.theme}</span>
            <span>溫馨伴讀・一齊成長 🍃</span>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.onload = function() {
      loadState();
      renderActiveBookHome();
    };
  </script>
  
</body>
</html>
