<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zuzu書櫃</title>
  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" href="manifest.json">
  <!-- 引入 Firebase 模組化 SDK -->
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js" type="module"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js" type="module"></script>
  <!-- 引入可愛手寫風格字體 -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@400;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paperBlue: '#A5BAD2',
            warmPink: '#F3D8D7',
            cardBg: '#FFFDF9',
            inkColor: '#534340',
            accentOrange: '#F4A261',
            grassGreen: '#9CBD5B'
          },
          fontFamily: {
            hand: ['Gaegu', 'Fredoka', 'sans-serif'],
          }
        }
      }
    }
  </script>
  <style>
    /* 32-bit 貓咪像素呼吸與搖尾巴動畫 */
    @keyframes pixel-breath {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1, 0.96) translateY(0.5px); }
    }
    .animate-pixel-breath {
      animation: pixel-breath 3s steps(2, end) infinite;
      transform-origin: bottom center;
    }

    @keyframes pixel-tail {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
    }
    .animate-pixel-tail {
      animation: pixel-tail 2s steps(2, end) infinite;
      transform-origin: 24px 22px; 
    }

    /* 手繪感粗黑外框 */
    .sketch-border {
      border: 4px solid #534340;
      box-shadow: 4px 4px 0px #534340;
    }
    
    .sketch-border-sm {
      border: 3px solid #534340;
      box-shadow: 2px 2px 0px #534340;
    }

    /* 隱藏滾動條但保留滾動功能 */
    .no-scrollbar::-webkit-scrollbar {
      display: none;
    }
    .no-scrollbar {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* 溫馨滾動條樣式 */
    ::-webkit-scrollbar {
      width: 8px;
    }
    ::-webkit-scrollbar-track {
      background: #FFFDF9;
      border-left: 3px solid #534340;
    }
    ::-webkit-scrollbar-thumb {
      background: #F3D8D7;
      border: 3px solid #534340;
      border-radius: 4px;
    }

    /* 手繪紙張噪點濾鏡 */
    .paper-texture {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
  </style>
</head>
<body class="bg-paperBlue font-hand text-inkColor min-h-screen relative flex flex-col overflow-x-hidden selection:bg-warmPink pb-8">
  
  <!-- 紙張噪點層 -->
  <div class="paper-texture"></div>

  <!-- 主容器 -->
  <main class="max-w-md w-full mx-auto px-4 pt-6 flex-grow flex flex-col justify-between">
    
    <!-- 頂部標題與狀態 -->
    <div class="w-full flex flex-col gap-4 mb-4">
      <div class="flex items-center justify-between">
        <!-- Logo -->
        <div class="flex items-center gap-2">
          <!-- 32-bit 像素風格小頭像 -->
          <div class="w-10 h-10 flex items-center justify-center bg-white rounded-xl border-3 border-inkColor overflow-hidden">
            <svg viewBox="0 0 32 32" class="w-8 h-8" style="image-rendering: pixelated;">
              <path d="M 9,15 H 23 V 24 H 6 V 15 Z" fill="#FFF5E6" />
              <rect x="11" y="17" width="1" height="1" fill="#534340" />
              <rect x="20" y="17" width="1" height="1" fill="#534340" />
              <rect x="15" y="18" width="2" height="1" fill="#534340" />
              <rect x="9" y="12" width="2" height="3" fill="#534340" />
              <rect x="21" y="12" width="2" height="3" fill="#534340" />
            </svg>
          </div>
          <h1 class="text-3xl font-extrabold tracking-wide drop-shadow-sm select-none">Zuzu書櫃</h1>
        </div>
        
        <!-- 分頁切換按鈕 -->
        <div class="flex gap-1 bg-white/40 p-1 rounded-full border-2 border-inkColor min-w-[175px] justify-between">
          <button id="tab-home-btn" onclick="switchTab('home')" class="px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full bg-inkColor text-warmPink transition-all flex-1 text-center">小屋</button>
          <button id="tab-bookshelf-btn" onclick="switchTab('bookshelf')" class="px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full hover:bg-white/30 transition-all flex-1 text-center">書櫃</button>
          <button id="tab-gallery-btn" onclick="switchTab('gallery')" class="px-2.5 py-1 text-xs sm:text-sm font-semibold rounded-full hover:bg-white/30 transition-all flex-1 text-center">明信片</button>
        </div>
      </div>

      <!-- 圖書狀態面板 -->
      <div class="grid grid-cols-3 gap-2 bg-warmPink/90 rounded-2xl p-3 sketch-border text-center font-bold select-none">
        <div class="flex flex-col items-center justify-center bg-white/65 py-1 rounded-xl border-2 border-inkColor">
          <span class="text-xs text-inkColor/80">已睇完 🏆</span>
          <div class="flex items-center gap-1 mt-0.5">
            <span id="stat-finished" class="text-xl">0</span>
          </div>
        </div>
        <div class="flex flex-col items-center justify-center bg-white/65 py-1 rounded-xl border-2 border-inkColor">
          <span class="text-xs text-inkColor/80">睇緊 📖</span>
          <div class="flex items-center gap-1 mt-0.5">
            <span id="stat-reading" class="text-xl">0</span>
          </div>
        </div>
        <div class="flex flex-col items-center justify-center bg-white/65 py-1 rounded-xl border-2 border-inkColor">
          <span class="text-xs text-inkColor/80">想睇 💤</span>
          <div class="flex items-center gap-1 mt-0.5">
            <span id="stat-wishlist" class="text-xl">0</span>
          </div>
        </div>
      </div>
    </div>

    <!-- 視圖主容器 -->
    <div class="flex-grow flex flex-col justify-start pt-2 min-h-[460px]">

      <!-- ==================== VIEW 1: 小屋伴讀 (ACTIVE BOOK) ==================== -->
      <div id="view-home" class="w-full flex flex-col items-center gap-4 transition-all duration-300">
        
        <!-- 伴讀卡牌 -->
        <div class="w-full bg-warmPink rounded-[2.5rem] p-5 sketch-border flex flex-col relative select-none">
          
          <!-- 卡牌頂部狀態 -->
          <div class="flex justify-between items-center mb-3">
            <span class="bg-white px-4 py-1 rounded-full text-sm font-bold border-2 border-inkColor tracking-widest">
              睇緊伴讀中
            </span>
            <span id="home-card-header-right" class="text-lg font-extrabold pr-2 text-inkColor/90">
              伴讀緊
            </span>
          </div>

          <!-- 貓咪畫框 -->
          <div class="w-full aspect-[4/3] rounded-3xl overflow-hidden sketch-border bg-[#9CBD5B] relative flex items-center justify-center cursor-pointer active:scale-[0.98] transition-transform" onclick="petActiveCat()">
            <!-- 動態繪製 SVG 像素貓咪 -->
            <div id="active-cat-svg-container" class="w-full h-full"></div>
            
            <!-- 摸貓貓時飄出嘅心心 -->
            <div id="heart-floaters" class="absolute inset-0 pointer-events-none overflow-hidden"></div>
            
            <!-- 摸貓提示 -->
            <div class="absolute bottom-2 right-4 bg-white/80 border-2 border-inkColor text-[11px] px-2 py-0.5 rounded-full font-bold opacity-60">
              🐾 摸吓像素貓
            </div>
          </div>

          <!-- 書名橫幅 -->
          <div class="bg-white mt-4 py-2 px-3 rounded-2xl border-3 border-inkColor flex flex-col items-center text-center">
            <span id="active-book-title" class="text-xl font-black">同步中...</span>
            <span id="active-book-author" class="text-xs font-semibold text-inkColor/70 mt-0.5">作者：--</span>
          </div>

          <!-- 進度詳情欄 -->
          <div class="bg-white/90 mt-3 p-4 rounded-3xl border-3 border-inkColor flex flex-col gap-2">
            <div class="flex justify-between text-sm font-bold">
              <span>飽食親密度</span>
              <span id="active-progress-text">讀咗 0%</span>
            </div>
            <!-- 進度條 -->
            <div class="w-full h-5 bg-warmPink/50 rounded-full border-3 border-inkColor overflow-hidden relative">
              <div id="active-progress-bar" class="h-full bg-accentOrange border-r-3 border-inkColor transition-all duration-500" style="width: 0%;"></div>
            </div>
          </div>

        </div>

        <!-- 登記進度按鈕 -->
        <button onclick="openLogModal()" class="w-full bg-accentOrange hover:bg-amber-400 py-3.5 rounded-2xl sketch-border font-black text-xl tracking-wider active:translate-y-1 active:shadow-none transition-all">
          📖 記低今日讀書進度
        </button>
      </div>

      <!-- ==================== VIEW 2: 書櫃 (BOOKSHELF) ==================== -->
      <div id="view-bookshelf" class="w-full flex flex-col gap-4 transition-all duration-300 hidden">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-black">我嘅藏書同貓貓</h2>
          <button onclick="openAddBookModal()" class="bg-warmPink hover:bg-pink-200 px-4 py-2 rounded-xl sketch-border-sm font-bold text-sm">
            ➕ 加新書
          </button>
        </div>

        <!-- 狀態篩選按鈕列 -->
        <div class="w-full flex-shrink-0 flex gap-1.5 overflow-x-auto px-1 pb-2 no-scrollbar select-none">
          <button id="filter-bs-all" onclick="setBookshelfFilter('all')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-inkColor text-warmPink whitespace-nowrap transition-all">全部</button>
          <button id="filter-bs-reading" onclick="setBookshelfFilter('reading')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all">睇緊 📖</button>
          <button id="filter-bs-wishlist" onclick="setBookshelfFilter('wishlist')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all">想睇 💤</button>
          <button id="filter-bs-finished" onclick="setBookshelfFilter('finished')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all">已睇完 🏆</button>
        </div>

        <!-- 書櫃列表 -->
        <div id="bookshelf-list" class="w-full flex flex-col gap-4 pr-1 pb-4"></div>
      </div>

      <!-- ==================== VIEW 3: 明信片畫廊 (GALLERY) ==================== -->
      <div id="view-gallery" class="w-full flex flex-col gap-4 transition-all duration-300 hidden">
        <div class="flex justify-between items-center">
          <h2 class="text-2xl font-black">成就明信片畫廊</h2>
          <span id="gallery-count" class="bg-white border-2 border-inkColor px-3 py-1 rounded-full text-xs font-bold">已收集: 0 張</span>
        </div>

        <!-- 動態類別篩選按鈕列 -->
        <div id="gallery-filter-container" class="w-full flex-shrink-0 flex gap-1.5 overflow-x-auto px-1 pb-2 no-scrollbar select-none">
          <!-- 將由 JS 動態生成 -->
        </div>

        <!-- 明信片列表 -->
        <div id="gallery-list" class="w-full flex flex-col gap-6 px-1 pb-12"></div>
      </div>

    </div>

  </main>

  <!-- ==================== MODAL: 新增書籍 ==================== -->
  <div id="modal-add-book" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-cardBg w-full max-w-sm rounded-[2rem] sketch-border p-6 relative flex flex-col max-h-[85vh]">
      
      <!-- 關閉按鈕 -->
      <button onclick="closeAddBookModal()" class="absolute -top-3 -right-3 bg-warmPink hover:bg-pink-200 w-10 h-10 rounded-full sketch-border-sm flex items-center justify-center text-xl font-bold z-10">
        ❌
      </button>

      <h3 class="text-2xl font-black text-center border-b-3 border-inkColor pb-2 flex-shrink-0">新加一本書</h3>

      <div class="overflow-y-auto flex-grow flex flex-col gap-4 pt-3 pr-1 no-scrollbar">
        <!-- 輸入表單 -->
        <div class="flex flex-col gap-3 font-semibold text-sm">
          <div class="flex flex-col gap-1">
            <label>📖 書名</label>
            <input id="input-book-name" type="text" placeholder="例如：福爾摩斯探案集" class="bg-amber-50/60 border-3 border-inkColor p-2.5 rounded-xl outline-none focus:bg-warmPink/25 font-bold">
          </div>
          <div class="flex flex-col gap-1">
            <label>✏️ 作者</label>
            <input id="input-book-author" type="text" placeholder="例如：柯南·道爾" class="bg-amber-50/60 border-3 border-inkColor p-2.5 rounded-xl outline-none focus:bg-warmPink/25 font-bold">
          </div>
          <div class="flex flex-col gap-1">
            <label>🏷️ 揀個書本主題（吸引像素伴讀精靈）</label>
            <select id="input-book-theme" class="bg-amber-50/60 border-3 border-inkColor p-2.5 rounded-xl outline-none focus:bg-warmPink/25 font-bold">
              <option value="商業 / 理財投資">🪙 商業 / 理財投資 (發光金幣橘貓)</option>
              <option value="心靈 / 心理成長">🌱 心靈 / 心理成長 (頭頂發芽薄荷貓)</option>
              <option value="懸疑/推理小說">🔍 懸疑/推理小說 (芝麻灰偵探鏡貓)</option>
              <option value="溫馨/療癒小說">☕ 溫馨/療癒小說 (焦糖橘斑烤奶貓)</option>
              <option value="通用主題">🐱 其他通用主題 (手帳風經典白貓)</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div class="flex flex-col gap-1">
              <label>🏁 現時頁數</label>
              <input id="input-book-current" type="number" min="0" value="0" inputmode="numeric" class="bg-amber-50/60 border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
            </div>
            <div class="flex flex-col gap-1">
              <label>📖 總頁數</label>
              <input id="input-book-total" type="number" min="1" value="200" inputmode="numeric" class="bg-amber-50/60 border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold">
            </div>
          </div>
        </div>

        <button onclick="submitNewBook()" class="bg-accentOrange hover:bg-amber-400 py-3 rounded-xl sketch-border-sm font-black text-lg active:translate-y-1 transition-all flex-shrink-0 mb-1">
          🐾 帶像素流浪貓返屋企
        </button>
      </div>

    </div>
  </div>

  <!-- ==================== MODAL: 修改/編輯書籍 ==================== -->
  <div id="modal-edit-book" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-cardBg w-full max-w-sm rounded-[2rem] sketch-border p-6 relative flex flex-col max-h-[85vh]">
      
      <!-- 關閉按鈕 -->
      <button onclick="closeEditBookModal()" class="absolute -top-3 -right-3 bg-warmPink hover:bg-pink-200 w-10 h-10 rounded-full sketch-border-sm flex items-center justify-center text-xl font-bold z-10">
        ❌
      </button>

      <h3 class="text-2xl font-black text-center border-b-3 border-inkColor pb-2 flex-shrink-0">修改書籍資料</h3>

      <div class="overflow-y-auto flex-grow flex flex-col gap-4 pt-3 pr-1 no-scrollbar">
        <input id="edit-book-id" type="hidden">

        <div class="flex flex-col gap-3 font-semibold text-sm">
          <div class="flex flex-col gap-1">
            <label>📖 書名</label>
            <input id="edit-book-name" type="text" class="bg-amber-100/50 border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold focus:bg-warmPink/30">
          </div>
          <div class="flex flex-col gap-1">
            <label>✏️ 作者</label>
            <input id="edit-book-author" type="text" class="bg-amber-100/50 border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold focus:bg-warmPink/30">
          </div>
          <div class="flex flex-col gap-1">
            <label>🏷️ 書本主題</label>
            <select id="edit-book-theme" class="bg-amber-100/50 border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold focus:bg-warmPink/30">
              <option value="商業 / 理財投資">🪙 商業 / 理財投資</option>
              <option value="心靈 / 心理成長">🌱 心靈 / 心理成長</option>
              <option value="懸疑/推理小說">🔍 懸疑/推理小說</option>
              <option value="溫馨/療癒小說">☕ 溫馨/療癒小說</option>
              <option value="通用主題">🐱 其他通用主題</option>
            </select>
          </div>
          <div class="grid grid-cols-2 gap-2">
            <div class="flex flex-col gap-1">
              <label>🏁 現時頁數</label>
              <input id="edit-book-current" type="number" min="0" inputmode="numeric" class="bg-amber-100/50 border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold focus:bg-warmPink/30">
            </div>
            <div class="flex flex-col gap-1">
              <label>📖 總頁數</label>
              <input id="edit-book-total" type="number" min="1" inputmode="numeric" class="bg-amber-100/50 border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold focus:bg-warmPink/30">
            </div>
          </div>
        </div>

        <button onclick="submitEditBook()" class="bg-[#9CBD5B] hover:bg-green-500 py-3 rounded-xl sketch-border-sm font-black text-lg active:translate-y-1 transition-all flex-shrink-0 mb-1">
          💾 儲存修改
        </button>
      </div>
    </div>
  </div>

  <!-- ==================== MODAL: 登記進度 ==================== -->
  <div id="modal-log-progress" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[100] flex items-center justify-center p-4 hidden">
    <div class="bg-cardBg w-full max-w-sm rounded-[2rem] sketch-border p-6 relative flex flex-col max-h-[85vh]">
      
      <!-- 關閉按鈕 -->
      <button onclick="closeLogModal()" class="absolute -top-3 -right-3 bg-warmPink hover:bg-pink-200 w-10 h-10 rounded-full sketch-border-sm flex items-center justify-center text-xl font-bold z-10">
        ❌
      </button>

      <h3 class="text-2xl font-black text-center border-b-3 border-inkColor pb-2 flex-shrink-0">今日讀書成果</h3>
      
      <div class="overflow-y-auto flex-grow flex flex-col gap-4 pt-3 pr-1 no-scrollbar">
        <p class="text-sm font-semibold text-center text-inkColor/80">
          更新《<span id="log-book-name-label" class="font-extrabold text-accentOrange"></span>》進度，餵吓你隻像素貓！
        </p>

        <div class="flex flex-col gap-4 font-bold">
          <div class="flex justify-between items-center bg-warmPink/40 p-3 rounded-xl border-2 border-inkColor">
            <span>原本讀到：</span>
            <span id="log-current-status-label">0 / 200 頁</span>
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm">📖 我今日讀到第幾頁？</label>
            <input id="input-log-new-page" type="number" inputmode="numeric" class="bg-amber-50/60 border-3 border-inkColor p-3 rounded-xl outline-none text-xl text-center" placeholder="輸入目標頁數">
          </div>

          <div class="flex flex-col gap-1">
            <label class="text-sm">📝 寫低今日隨筆（會記喺明信片度架）</label>
            <textarea id="input-log-note" rows="2" placeholder="呢本書帶俾你嘅諗法，或者想同貓貓講嘅嘢..." class="bg-amber-50/60 border-3 border-inkColor p-2.5 rounded-xl outline-none font-bold text-sm resize-none"></textarea>
          </div>
        </div>

        <button onclick="submitProgress()" class="bg-[#9CBD5B] hover:bg-green-500 py-3 rounded-xl sketch-border-sm font-black text-lg active:translate-y-1 transition-all flex-shrink-0 mb-1">
          餵像素肉泥罐罐！
        </button>
      </div>

    </div>
  </div>
  
  <!-- 客製化彈窗提示 -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 bg-white px-6 py-3 rounded-full sketch-border-sm font-bold z-[200] hidden flex items-center gap-2 animate-bounce">
    <span id="toast-icon">🐱</span>
    <span id="toast-text">哈囉！</span>
  </div>

  <script type="module">
    // 引入 Firebase SDK 模組功能
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Zuzu-Travel 專案憑證
    const firebaseConfig = {
      apiKey: "AIzaSyCZSj0CQc_V7LuqUurXOJndNGZwdSK8OlI",
      authDomain: "zuzu-travel-564a8.firebaseapp.com",
      projectId: "zuzu-travel-564a8",
      storageBucket: "zuzu-travel-564a8.firebasestorage.app",

    // 初始化 Firebase 同 Firestore 資料庫
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const booksCollection = collection(db, "books"); 

    // 記憶體中的狀態數據
    let state = {
      books: [],
      activeBookId: null,
      bookshelfFilter: 'all', 
      galleryFilter: '全部'    
    };

    // 載入狀態（改為從 Firebase 撈取最新數據）
    async function loadState() {
      try {
        showToast("同步雲端中...", "⏳");
        const querySnapshot = await getDocs(booksCollection);
        let fetchedBooks = [];
        querySnapshot.forEach((doc) => {
          fetchedBooks.push({ id: doc.id, ...doc.data() });
        });
        
        state.books = fetchedBooks;
        
        // 自動鎖定第一本「睇緊」嘅書做小屋伴讀
        const currentReading = state.books.find(b => b.status === 'reading');
        state.activeBookId = currentReading ? currentReading.id : (state.books.length > 0 ? state.books[0].id : null);
        
        updateTopStatsUI();
        renderActiveBookHome();
      } catch (error) {
        console.error("Firebase 讀取失敗: ", error);
        showToast("雲端同步失敗 😿", "❌");
      }
    }

    // 修改與刪除功能邏輯
    window.openEditBookModal = function(id) {
      const book = state.books.find(b => b.id === id);
      if (!book) return;

      document.getElementById('edit-book-id').value = book.id;
      document.getElementById('edit-book-name').value = book.name;
      document.getElementById('edit-book-author').value = book.author;
      document.getElementById('edit-book-theme').value = book.theme;
      document.getElementById('edit-book-current').value = book.currentPage;
      document.getElementById('edit-book-total').value = book.totalPage;

      document.getElementById('modal-edit-book').classList.remove('hidden');
    }

    window.closeEditBookModal = function() {
      document.getElementById('modal-edit-book').classList.add('hidden');
    }

    window.submitEditBook = async function() {
      const id = document.getElementById('edit-book-id').value;
      const book = state.books.find(b => b.id === id);
      if (!book) return;

      const name = document.getElementById('edit-book-name').value.trim();
      const author = document.getElementById('edit-book-author').value.trim();
      const theme = document.getElementById('edit-book-theme').value;
      const current = parseInt(document.getElementById('edit-book-current').value) || 0;
      const total = parseInt(document.getElementById('edit-book-total').value) || 200;

      if (!name) {
        showToast("書名唔可以留空字！", "❌");
        return;
      }
      if (current < 0 || total <= 0 || current > total) {
        showToast("頁數比例好似唔多啱啵！", "❌");
        return;
      }

      let status = current === total ? "finished" : (current > 0 ? "reading" : "wishlist");

      showToast("儲存修改中...", "⏳");
      try {
        await updateDoc(doc(db, "books", id), { name, author, theme, currentPage: current, totalPage: total, status });
        closeEditBookModal();
        showToast(`《${name}》資料已更新！`, "💾");
        await loadState();
        renderBookshelf();
      } catch (e) {
        showToast("修改失敗 😿", "❌");
      }
    }

    window.deleteBook = async function(id, name) {
      if (confirm(`你確定要將《${name}》同埋佢隻像素貓送走嗎？雲端紀錄會消失架... 😿`)) {
        try {
          showToast("正在從雲端移除...", "⏳");
          await deleteDoc(doc(db, "books", id));
          showToast(`已成功刪除《${name}》`, "🗑️");
          await loadState();
          renderBookshelf();
        } catch (e) {
          showToast("刪除失敗 😿", "❌");
        }
      }
    }

    // 32-bit 動態像素大福貓生成演算法
    function getCatSVG(theme, isBreathing = true) {
      let bodyFill = "#FFFFFF";      // 麻糬主色
      let patchFill = "#E29578";     // 斑紋顏色
      let bgFill = "#E8F1F2";        // 背景色
      let details = "";              // 特殊主題像素道具

      switch(theme) {
        case "商業 / 理財投資":
          bodyFill = "#FFFDF0"; patchFill = "#FFD166"; bgFill = "#E8DFF5";   
          // 32-bit 像素金幣
          details = `<rect x="23" y="21" width="4" height="4" fill="#FFD166" stroke="#534340" stroke-width="1"/><rect x="25" y="22" width="1" height="2" fill="#534340"/>`;
          break;
        case "心靈 / 心理成長":
          bodyFill = "#F4F9F4"; patchFill = "#A8DADC"; bgFill = "#FCEADE";   
          // 頭頂像素發芽
          details = `<rect x="15" y="10" width="1" height="3" fill="#5CBD74"/><rect x="14" y="9" width="1" height="1" fill="#5CBD74"/><rect x="16" y="10" width="1" height="1" fill="#5CBD74"/>`;
          break;
        case "懸疑/推理小說":
          bodyFill = "#EAEAEA"; patchFill = "#6C757D"; bgFill = "#F4ECCF";   
          // 像素偵探帽與放大鏡
          details = `<rect x="13" y="11" width="6" height="2" fill="#534340"/><rect x="11" y="13" width="10" height="1" fill="#534340"/><rect x="23" y="22" width="3" height="3" fill="none" stroke="#534340" stroke-width="1"/><line x1="25" y1="24" x2="27" y2="26" stroke="#534340" stroke-width="1"/>`;
          break;
        case "溫馨/療癒小說":
          bodyFill = "#FFF5E6"; patchFill = "#F4A261"; bgFill = "#EDF2FB";   
          // 旁邊一小杯冒煙像素熱茶
          details = `<rect x="24" y="22" width="3" height="2" fill="#FFADAD"/><rect x="24" y="21" width="1" height="1" fill="#534340" opacity="0.3"/>`;
          break;
        default:
          bodyFill = "#FFFFFF"; patchFill = "#E29578"; bgFill = "#E8F1F2";
          break;
      }

      return `
        <svg viewBox="0 0 32 32" class="w-full h-full" style="image-rendering: pixelated; background: transparent;">
          <rect x="1" y="1" width="30" height="30" fill="${bgFill}" stroke="#534340" stroke-width="1" />
          <rect x="2" y="2" width="28" height="28" fill="none" stroke="#534340" stroke-width="0.5" stroke-dasharray="2,2" opacity="0.3"/>
          <rect x="8" y="25" width="16" height="1" fill="#534340" opacity="0.15" />
          <g class="${isBreathing ? 'animate-pixel-breath' : ''}">
            <g class="animate-pixel-tail">
              <path d="M 26,19 H 29 V 22 H 28 V 24 H 26 Z" fill="#534340" />
              <path d="M 26,20 H 28 V 22 H 27 V 23 H 26 Z" fill="${bodyFill}" />
              <rect x="27" y="20" width="1" height="1" fill="${patchFill}" />
            </g>
            <path d="M 9,15 H 23 V 16 H 25 V 17 H 26 V 21 H 27 V 24 H 26 V 25 H 6 V 24 H 5 V 21 H 6 V 17 H 7 V 16 H 9 Z" fill="#534340" />
            <path d="M 9,16 H 23 V 17 H 25 V 21 H 26 V 24 H 6 V 21 H 7 V 17 H 9 Z" fill="${bodyFill}" />
            <path d="M 7,17 H 10 V 19 H 8 V 20 H 7 Z" fill="${patchFill}" />
            <path d="M 23,17 H 25 V 19 H 24 V 20 H 23 Z" fill="${patchFill}" />
            <rect x="8" y="12" width="3" height="3" fill="#534340" />
            <rect x="9" y="13" width="1" height="2" fill="#FFB3C1" />
            <rect x="21" y="12" width="3" height="3" fill="#534340" />
            <rect x="22" y="13" width="1" height="2" fill="#FFB3C1" />
            <rect x="9" y="15" width="1" height="1" fill="${bodyFill}" />
            <rect x="22" y="15" width="1" height="1" fill="${bodyFill}" />
            <rect x="11" y="18" width="1" height="1" fill="#534340" />
            <rect x="20" y="18" width="1" height="1" fill="#534340" />
            <rect x="9" y="19" width="2" height="1" fill="#FFB3C1" opacity="0.6" />
            <rect x="21" y="19" width="2" height="1" fill="#FFB3C1" opacity="0.6" />
            <rect x="15" y="19" width="2" height="1" fill="#534340" />
            <rect x="4" y="19" width="2" height="1" fill="#534340" opacity="0.4" />
            <rect x="26" y="19" width="2" height="1" fill="#534340" opacity="0.4" />
          </g>
          <g>${details}</g>
        </svg>
      `;
    }

    // 分頁切換邏輯
    window.switchTab = function(viewName) {
      document.getElementById('view-home').classList.add('hidden');

    // 小屋伴讀畫面渲染
    function renderActiveBookHome() {
      const activeBook = state.books.find(b => b.id === state.activeBookId);
      const container = document.getElementById('active-cat-svg-container');
      
      if (!activeBook) {
        document.getElementById('active-book-title').textContent = "未有睇緊嘅書";
        document.getElementById('active-book-author').textContent = "快啲去「書櫃」揀本書，吸引流浪貓貓過嚟啦！";
        document.getElementById('active-progress-text').textContent = "進度：0%";
        document.getElementById('active-progress-bar').style.width = "0%";
        document.getElementById('home-card-header-right').textContent = "流浪緊";
        container.innerHTML = getCatSVG("通用主題", false);
        return;
      }

      document.getElementById('active-book-title').textContent = `《${activeBook.name}》`;
      document.getElementById('active-book-author').textContent = `作者：${activeBook.author || '佚名'}`;
      
      const percent = Math.min(100, Math.floor((activeBook.currentPage / activeBook.totalPage) * 100));
      document.getElementById('active-progress-text').textContent = `讀咗 ${percent}% (${activeBook.currentPage}/${activeBook.totalPage} 頁)`;
      document.getElementById('active-progress-bar').style.width = `${percent}%`;
      document.getElementById('home-card-header-right').textContent = `伴讀緊`;

      container.innerHTML = getCatSVG(activeBook.theme, true);

    window.petActiveCat = function() {
      const activeBook = state.books.find(b => b.id === state.activeBookId);
      if (!activeBook) {
        showToast("出面有隻流浪貓探緊頭，快啲帶佢返屋企啦！", "🐾");
        return;
      }

    function updateTopStatsUI() {
      const finishedCount = state.books.filter(b => b.status === 'finished').length;
      const readingCount = state.books.filter(b => b.status === 'reading').length;
      const wishlistCount = state.books.filter(b => b.status === 'wishlist').length;

      document.getElementById('stat-finished').textContent = finishedCount;
      document.getElementById('stat-reading').textContent = readingCount;
      document.getElementById('stat-wishlist').textContent = wishlistCount;
    }

    function renderBookshelf() {
      const container = document.getElementById('bookshelf-list');
      container.innerHTML = "";

      const filters = ['all', 'reading', 'wishlist', 'finished'];
      filters.forEach(f => {
        const btn = document.getElementById(`filter-bs-${f}`);
        if (btn) {
          if (f === state.bookshelfFilter) {
            btn.className = "px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-inkColor text-warmPink whitespace-nowrap transition-all";
          } else {
            btn.className = "px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor bg-white text-inkColor whitespace-nowrap transition-all";
          }
        }
      });

      let filteredBooks = state.books;
      if (state.bookshelfFilter !== 'all') {
        filteredBooks = state.books.filter(b => b.status === state.bookshelfFilter);
      }

      if (filteredBooks.length === 0) {
        container.innerHTML = `
          <div class="bg-white/90 p-8 rounded-3xl sketch-border text-center w-full">
            <p class="font-extrabold text-lg">呢個分類暫時冇書喔 🍂</p>
          </div>
        `;
        return;
      }

      filteredBooks.forEach(book => {
        const percent = Math.min(100, Math.floor((book.currentPage / book.totalPage) * 100));
        const isActive = book.id === state.activeBookId;
        
        let statusBadge = "";
        let actionButton = "";

        if (book.status === 'finished') {
          statusBadge = `<span class="bg-emerald-100 text-emerald-800 text-[11px] px-2 py-0.5 rounded-full border-2 border-emerald-800 font-extrabold whitespace-nowrap">🏆 已睇完</span>`;
          actionButton = `<span class="text-xs text-emerald-700 font-bold mr-1 whitespace-nowrap">已馴服明信片</span>`;
        } else if (book.status === 'wishlist') {
          statusBadge = `<span class="bg-amber-100 text-amber-800 text-[11px] px-2 py-0.5 rounded-full border-2 border-amber-800 font-extrabold whitespace-nowrap">💤 想睇</span>`;
          actionButton = `
            <button onclick="adoptBook('${book.id}')" class="bg-accentOrange hover:bg-amber-400 px-2.5 py-1 rounded-xl sketch-border-sm text-xs font-black mr-1 whitespace-nowrap">
              開始伴讀
            </button>
          `;
        } else {
          statusBadge = `<span class="bg-blue-100 text-blue-800 text-[11px] px-2 py-0.5 rounded-full border-2 border-blue-800 font-extrabold whitespace-nowrap">📖 睇緊</span>`;
          actionButton = isActive 
            ? `<span class="text-xs text-accentOrange font-black mr-1 whitespace-nowrap">✨ 小屋伴讀中</span>`
            : `
              <button onclick="setActiveBook('${book.id}')" class="bg-warmPink hover:bg-pink-200 px-2.5 py-1 rounded-xl sketch-border-sm text-xs font-black mr-1 whitespace-nowrap">
                去小屋
              </button>
            `;
        }

        const card = document.createElement('div');
        card.className = `p-4 rounded-3xl sketch-border flex gap-3 items-center transition-all w-full ${isActive ? 'bg-warmPink/40' : 'bg-white'}`;

        card.innerHTML = `
          <div class="w-16 h-16 rounded-xl overflow-hidden border-2 border-inkColor bg-white flex-shrink-0 relative">
            ${getCatSVG(book.theme, false)}
          </div>
          <div class="flex-grow min-w-0 flex flex-col gap-1">
            <div class="flex justify-between items-start gap-2">
              <div class="min-w-0 flex-grow">
                <h3 class="font-extrabold text-base leading-tight truncate">《${book.name}》</h3>
                <p class="text-xs text-inkColor/70 font-semibold truncate">作者：${book.author || '佚名'}</p>
              </div>
              <div class="flex flex-col items-end gap-1 flex-shrink-0">
                ${statusBadge}
                <button onclick="deleteBook('${book.id}', '${book.name}')" class="text-[11px] opacity-40 hover:opacity-100 transition-opacity text-rose-600 font-bold">🗑️ 刪除</button>
              </div>
            </div>
            
            <div class="flex items-center gap-2 mt-1">
              <div class="flex-grow h-3 bg-warmPink/30 rounded-full border-2 border-inkColor overflow-hidden">
                <div class="h-full bg-accentOrange" style="width: ${percent}%;"></div>
              </div>
              <span class="text-xs font-bold whitespace-nowrap flex-shrink-0">${percent}%</span>
            </div>

            <div class="flex justify-between items-center mt-1 border-t-2 border-dashed border-inkColor/20 pt-1.5 gap-2">
              <span class="text-[10px] bg-white border border-inkColor px-1.5 py-0.5 rounded text-inkColor/70 font-semibold truncate max-w-[120px]">${book.theme}</span>
              <div class="flex items-center flex-shrink-0">
                ${actionButton}
                <button onclick="openEditBookModal('${book.id}')" class="bg-white hover:bg-slate-100 p-1 px-1.5 rounded-lg border border-inkColor text-xs font-bold flex-shrink-0">✏️ 修改</button>
              </div>
            </div>
          </div>
        `;
        container.appendChild(card);
      });
    }

      state.activeBookId = id;
      showToast("切換伴讀貓咪！", "🏠");
      renderActiveBookHome();
      renderBookshelf();
    }

    window.adoptBook = async function(id) {
      try {
        await updateDoc(doc(db, "books", id), { status: "reading" });
        state.activeBookId = id;
        showToast("開始伴讀！", "🎉");
        await loadState();
        renderBookshelf();
      } catch (e) {
        showToast("操作失敗", "❌");
      }

      state.bookshelfFilter = filterType;
      renderBookshelf();
    }

    window.setGalleryFilter = function(theme) {
      state.galleryFilter = theme;
      renderGallery();
    }

    window.openAddBookModal = function() {
      document.getElementById('modal-add-book').classList.remove('hidden');
    }
    window.closeAddBookModal = function() {
      document.getElementById('modal-add-book').classList.add('hidden');
    }

    window.submitNewBook = async function() {
      const name = document.getElementById('input-book-name').value.trim();
      const author = document.getElementById('input-book-author').value.trim();
      const theme = document.getElementById('input-book-theme').value;
      const current = parseInt(document.getElementById('input-book-current').value) || 0;
      const total = parseInt(document.getElementById('input-book-total').value) || 200;

      if (!name) {
        showToast("入返書名先啦！", "❌");
        return;
      }
      if (current < 0 || total <= 0 || current > total) {
        showToast("頁數好似入錯咗啵！", "❌");
        return;
      }

      const id = `book-${Date.now()}`;
      const isFinished = current === total;

      const newBook = {
        name,
        author,
        theme,
        currentPage: current,
        totalPage: total,
        notes: "",
        status: isFinished ? "finished" : (current > 0 ? "reading" : "wishlist")
      };

      try {
        showToast("正在傳送雲端...", "⏳");
        await setDoc(doc(db, "books", id), newBook);

        closeAddBookModal();
        showToast(`《${name}》成功入落書櫃！`, "📖");
        
        document.getElementById('input-book-name').value = "";
        document.getElementById('input-book-author').value = "";
        document.getElementById('input-book-current').value = 0;

        await loadState(); 
        switchTab('bookshelf');
      } catch (error) {
        console.error("雲端新增失敗:", error);
        showToast("雲端儲存失敗 😿", "❌");
      }
    }

    window.openLogModal = function() {
      const activeBook = state.books.find(b => b.id === state.activeBookId);
      if (!activeBook) {
        showToast("去書櫃揀本書伴讀先啦！", "🐾");
        return;
      }

      document.getElementById('log-book-name-label').textContent = activeBook.name;
      document.getElementById('log-current-status-label').textContent = `${activeBook.currentPage} / ${activeBook.totalPage} 頁`;
      document.getElementById('input-log-new-page').value = activeBook.currentPage;
      document.getElementById('input-log-note').value = "";

      document.getElementById('modal-log-progress').classList.remove('hidden');
    }

    window.closeLogModal = function() {
      document.getElementById('modal-log-progress').classList.add('hidden');
    }

    window.submitProgress = async function() {
      const activeBook = state.books.find(b => b.id === state.activeBookId);
      if (!activeBook) return;

      const newPage = parseInt(document.getElementById('input-log-new-page').value);
      const note = document.getElementById('input-log-note').value.trim();

      if (isNaN(newPage) || newPage < activeBook.currentPage || newPage > activeBook.totalPage) {
        showToast(`頁數要喺 ${activeBook.currentPage} 同 ${activeBook.totalPage} 之間！`, "❌");
        return;
      }

      let updatedStatus = activeBook.status;
      if (newPage === activeBook.totalPage) {
        updatedStatus = "finished";
      }

      try {
        showToast("正在餵食肉泥罐罐...", "⏳");
        const bookRef = doc(db, "books", activeBook.id);
        await updateDoc(bookRef, {
          currentPage: newPage,
          notes: note ? note : activeBook.notes,
          status: updatedStatus
        });

        let alertText = newPage === activeBook.totalPage 
          ? `🎉 好好叻啊！《${activeBook.name}》全部睇完！攞到張成就明信片！` 
          : `讀完啦！真係好叻！`;

        closeLogModal();
        showToast(alertText, "🥫");
        await loadState(); 
      } catch (error) {
        console.error("雲端更新進度失敗:", error);
        showToast("雲端儲存失敗 😿", "❌");
      }
    }

    function renderGallery() {
      const container = document.getElementById('gallery-list');
      container.innerHTML = "";

      const finishedBooks = state.books.filter(b => b.status === 'finished');
      document.getElementById('gallery-count').textContent = `已收集: ${finishedBooks.length} 張`;

      if (finishedBooks.length === 0) {
        document.getElementById('gallery-filter-container').innerHTML = ""; 
        container.innerHTML = `
          <div class="bg-white/90 p-8 rounded-3xl sketch-border text-center w-full">
            <p class="font-extrabold text-lg">仲未有睇完嘅書架 🌟</p>
            <p class="text-xs text-inkColor/70 mt-2">當你將書睇到 100%，可愛嘅貓貓就會將你哋嘅回憶畫成明信片，儲喺呢度陪住你！</p>
          </div>
        `;
        return;
      }

      const filterContainer = document.getElementById('gallery-filter-container');
      const uniqueThemes = ['全部', ...new Set(finishedBooks.map(b => b.theme))];
      
      if (!uniqueThemes.includes(state.galleryFilter)) {
        state.galleryFilter = '全部';
      }

      filterContainer.innerHTML = uniqueThemes.map(theme => {
        const isSelected = theme === state.galleryFilter;
        return `
          <button onclick="setGalleryFilter('${theme}')" class="px-3 py-1.5 text-xs font-black rounded-full border-2 border-inkColor transition-all whitespace-nowrap ${
            isSelected ? 'bg-inkColor text-warmPink' : 'bg-white text-inkColor'
          }">
            ${theme}
          </button>
        `;
      }).join('');

      const filteredFinished = state.galleryFilter === '全部' 
        ? finishedBooks 
        : finishedBooks.filter(b => b.theme === state.galleryFilter);

      if (filteredFinished.length === 0) {
        container.innerHTML = `
          <div class="bg-white/90 p-8 rounded-3xl sketch-border text-center w-full">
            <p class="font-extrabold text-lg">呢個類別暫時未有明信片 🍂</p>
          </div>
        `;
        return;
      }

      filteredFinished.forEach(book => {
        const card = document.createElement('div');
        card.className = "w-full max-w-[360px] mx-auto bg-[#E5D4C3] rounded-[2.2rem] p-4 pb-6 sketch-border flex flex-col relative select-none animate-breath my-2";
        card.style.animationDuration = "12s";

        card.innerHTML = `
          <div class="flex justify-between items-center mb-2 px-1">
            <span class="text-xl font-black text-rose-400 tracking-wider">32-BIT STAGE</span>
            <span class="text-base font-extrabold text-rose-400">+250 HP</span>
          </div>
          <div class="w-full aspect-[4/3] rounded-2xl overflow-hidden sketch-border bg-white flex items-center justify-center">
            ${getCatSVG(book.theme, false)}
          </div>
          <div class="bg-[#D3A99B] border-3 border-inkColor py-1.5 px-3 rounded-xl flex justify-between items-center mt-3 gap-1">
            <span class="text-white font-extrabold text-xs sm:text-sm tracking-wide truncate">睇完啦：《${book.name}》</span>
          </div>
          <div class="bg-white mt-2 p-3 rounded-2xl border-3 border-inkColor flex flex-col gap-1 min-w-0">
            <p class="text-[10px] uppercase tracking-wider text-rose-400 font-extrabold">伴讀紀錄同諗法</p>
            <p class="text-xs font-bold leading-relaxed text-inkColor/90 break-words">
              書名：《${book.name}》 <br>
              作者：${book.author || '未知'} <br>
              讀後感：${book.notes || "奴才陪我一齊睇晒成本書！雲端數據滿載！"}
            </p>
          </div>
        `;
        container.appendChild(card);
      });
    }

    window.showToast = function(text, icon = "🐱") {
      const toast = document.getElementById('toast');
      document.getElementById('toast-icon').textContent = icon;
      document.getElementById('toast-text').textContent = text;
      toast.classList.remove('hidden');
      if (window.toastTimeout) clearTimeout(window.toastTimeout);
      window.toastTimeout = setTimeout(() => { toast.classList.add('hidden'); }, 3000);
    }

    // App 初始化啟動
    window.addEventListener('DOMContentLoaded', () => {
      loadState();
    });
  </script>
</body>
</html>
