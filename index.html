  <link rel="apple-touch-icon" sizes="192x192" href="icon-192.png">
  <link rel="apple-touch-icon" sizes="512x512" href="icon-512.png">
  <link rel="icon" type="image/png" href="icon-192.png">
  <link rel="manifest" id="main-manifest">
  <script>
  // 自動偵測網址後面的 ?owner= 參數
  const urlParams = new URLSearchParams(window.location.search);
  const owner = urlParams.get('owner');

  if (owner) {
    // 建立一個動態的 Manifest 內容，強行把當前的 owner 塞入 start_url
    const dynamicManifest = {
      "name": `書櫃 - ${owner}`,
      "short_name": `${owner} 的書櫃`,
      "start_url": window.location.pathname + "?owner=" + encodeURIComponent(owner),
      "display": "standalone",
      "background_color": "#ffffff",
      "theme_color": "#000000"
    };

    // 將物件轉成 Blob URL 並覆蓋原本的 manifest link
    const stringManifest = JSON.stringify(dynamicManifest);
    const blob = new Blob([stringManifest], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    
    // 搵返第 15 行嗰個 manifest 標籤並更新它
    const manifestLink = document.querySelector('link[rel="manifest"]');
    if (manifestLink) {
      manifestLink.href = manifestURL;
    }
  }
</script>

  <style>
    /* 32-bit 貓咪像素呼吸與搖尾巴動畫 */
    @keyframes pixel-breath {
      0%, 100% { transform: scale(1) translateY(0); }
      50% { transform: scale(1, 0.96) translateY(0.5px); }
    }
    .animate-pixel-breath {
      animation: pixel-breath 3s steps(2, end) infinite;
      transform-origin: bottom center;
    }

    @keyframes pixel-tail {
      0%, 100% { transform: rotate(0deg); }
      50% { transform: rotate(8deg); }
    }
    .animate-pixel-tail {
      animation: pixel-tail 2s steps(2, end) infinite;
      transform-origin: 24px 22px; 
    }

    /* 配件專屬跳格動態效果 */
    @keyframes pixel-item-float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-1.5px); }
    }
    .animate-item-float {
      animation: pixel-item-float 2.5s steps(2, end) infinite;
    }

    @keyframes pixel-item-spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .animate-item-spin {
      animation: pixel-item-spin 4s steps(4, end) infinite;
      transform-origin: 34px 22px; /* 精準對齊古錢幣與金星的軸心點 */
    }

    @keyframes pixel-item-pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    .animate-item-pulse {
      animation: pixel-item-pulse 1.5s steps(2, end) infinite;
      transform-origin: 34px 22px;
    }

    /* 確保主小屋大圖及書櫃小圖 SVG 橫向完美鋪滿，消滅左右兩條綠色邊 */
    #active-cat-svg-container svg, .w-20 svg {
      width: 100%;
      height: 100%;
      object-fit: fill;
    }

    /* 手繪感粗黑外框 */
    .sketch-border {
      border: 4px solid #534340;
      box-shadow: 4px 4px 0px #534340;
    }
    
    .sketch-border-sm {
      border: 3px solid #534340;
      box-shadow: 2px 2px 0px #534340;
    }

    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #FFFDF9; border-left: 3px solid #534340; }
    ::-webkit-scrollbar-thumb { background: #F3D8D7; border: 3px solid #534340; border-radius: 4px; }

    .paper-texture {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      pointer-events: none;
      z-index: 9999;
      opacity: 0.05;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
    }
  </style>
</head>
